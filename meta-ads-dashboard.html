      {/* ─── Facebook Page Section ─── */}
      <div className="flex items-center gap-2 mt-2">
        <svg className="w-4 h-4" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        <h2 className="font-display text-lg font-bold text-gray-900">Facebook Page · <span className="text-gray-400 font-normal">{page?.name}</span></h2>
      </div>
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div className="dash-card p-5">
          <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-400 mb-2">Page Followers</p>
          <p className="text-2xl font-bold font-display text-gray-900 tabular-nums">{fmt.number(page?.fanCount||0)}</p>
          <p className="text-[10px] text-gray-400 mt-1">total fans / followers</p>
        </div>
        <div className="dash-card p-5">
          <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-400 mb-2">Talking About</p>
          <p className="text-2xl font-bold font-display text-gray-900 tabular-nums">{fmt.number(page?.talkingAbout||0)}</p>
          <p className="text-[10px] text-gray-400 mt-1">people engaged last 7 days</p>
        </div>
        <div className="dash-card p-5 flex items-start gap-3">
          <div className="flex-shrink-0 w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center mt-0.5">
            <svg className="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <div>
            <p className="text-xs font-semibold text-gray-700 mb-0.5">Deeper FB analytics</p>
            <p className="text-[10px] text-gray-400 leading-relaxed">Meta deprecated classic Page Insights for new Pages Experience. Full reach/impression data requires the Meta Business Suite reporting API — flagged for future setup.</p>
          </div>
        </div>
      </div>

    </div>
  );
}

// ─── Empty State ───
function EmptyState({ brand }) {
  return (
    <div className="flex flex-col items-center justify-center py-20 text-gray-400 fade-in">
      <svg className="w-16 h-16 mb-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
      </svg>
      <p className="text-sm">No data for selected period</p>
      <p className="text-xs mt-1">Try adjusting the date range or check your token has ads_read permission</p>
    </div>
  );
}

// ─── Loading Overlay ───
function LoadingOverlay({ brand }) {
  const b = BRANDS[brand];
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center" style={{background: 'rgba(248,248,250,.85)', backdropFilter: 'blur(8px)'}}>
      <div className="text-center">
        <div className="w-10 h-10 border-3 border-gray-200 rounded-full spinner mx-auto mb-4" style={{borderTopColor: b.primary, borderWidth: '3px'}} />
        <p className="text-sm text-gray-500 font-medium">Pulling fresh data from Meta...</p>
      </div>
    </div>
  );
}

// ─── Main App ───
function App() {
  const [token, setToken] = useState(localStorage.getItem('meta_ads_token') || DEFAULT_TOKEN);
  const [brand, setBrand] = useState(localStorage.getItem('meta_ads_brand') || 'gaf');
  const [tab, setTab] = useState('overview');
  const [datePreset, setDatePreset] = useState('last_30d');
  const [customDates, setCustomDates] = useState({ since: '', until: '' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [data, setData] = useState(null);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [attrWindow, setAttrWindow] = useState('7d_click');
  const [organicData, setOrganicData] = useState(null);
  const [organicLoading, setOrganicLoading] = useState(false);

  const b = BRANDS[brand];

  const handleBrandSwitch = (newBrand) => {
    setBrand(newBrand);
    localStorage.setItem('meta_ads_brand', newBrand);
    setData(null);
    setOrganicData(null);
  };

  const loadOrganic = useCallback(async () => {
    if (!token) return;
    setOrganicLoading(true);
    try {
      const { since, until } = getDateRange(datePreset, customDates);
      if (!since || !until) return;
      const { igId, pageId } = BRANDS[brand];
      const result = await fetchOrganicData(igId, pageId, since, until, token);
      setOrganicData(result);
    } catch (err) {
      console.error('Organic fetch error:', err.message);
    } finally {
      setOrganicLoading(false);
    }
  }, [token, brand, datePreset, customDates]);

  const handleLogout = () => {
    localStorage.removeItem('meta_ads_token');
    setToken('');
    setData(null);
  };

  const fetchData = useCallback(async () => {
    if (!token) return;
    setLoading(true);
    setError(null);
    try {
      const { since, until } = getDateRange(datePreset, customDates);
      if (!since || !until) { setError('Please select valid dates'); setLoading(false); return; }
      const accountId = BRANDS[brand].accountId;
      const comp = getComparisonRange(since, until);

      const isLongRange = datePreset === 'last_12m' || datePreset === 'last_90d';
      const dailyIncrement = isLongRange ? 'monthly' : 1;

      const aw = attrWindow;
      const [campaignInsights, adsetInsights, adInsights, dailyInsights, compInsights, campaignMeta, videoInsights, breakdownAge, breakdownGender, breakdownPlatform, breakdownPosition, breakdownCountry] = await Promise.all([
        fetchInsights(accountId, 'campaign', since, until, token, aw),
        fetchInsights(accountId, 'adset', since, until, token, aw).catch(() => []),
        fetchInsights(accountId, 'ad', since, until, token, aw).catch(() => []),
        fetchDailyInsights(accountId, since, until, token, dailyIncrement, aw),
        fetchInsights(accountId, 'campaign', comp.since, comp.until, token, aw).catch(() => []),
        fetchCampaignMeta(accountId, token).catch(() => []),
        fetchVideoInsights(accountId, since, until, token, aw).catch(() => []),
        fetchBreakdownInsights(accountId, since, until, token, 'age', aw).catch(() => []),
        fetchBreakdownInsights(accountId, since, until, token, 'gender', aw).catch(() => []),
        fetchBreakdownInsights(accountId, since, until, token, 'publisher_platform', aw).catch(() => []),
        fetchBreakdownInsights(accountId, since, until, token, 'publisher_platform,platform_position', aw).catch(() => []),
        fetchBreakdownInsights(accountId, since, until, token, 'region', aw).catch(() => []),
      ]);

      const adIds = [...new Set(adInsights.map(r => r.ad_id).filter(Boolean))];
      const adsCreatives = await fetchAdsCreatives(adIds, token);

      setData({ campaignInsights, adsetInsights, adInsights, adsCreatives, dailyInsights, compInsights, campaignMeta, videoInsights, breakdownAge, breakdownGender, breakdownPlatform, breakdownPosition, breakdownRegion: breakdownCountry });
      setLastRefresh(new Date());
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  }, [token, brand, datePreset, customDates, attrWindow]);

  useEffect(() => {
    if (token) fetchData();
  }, [brand]);

  useEffect(() => {
    if (token && !data && !loading) fetchData();
  }, [token]);

  useEffect(() => {
    if (token && data) fetchData();
  }, [datePreset]);

  useEffect(() => {
    if (token && data) fetchData();
  }, [attrWindow]);

  useEffect(() => {
    if (token && data && datePreset === 'custom' && customDates.since && customDates.until) fetchData();
  }, [customDates.since, customDates.until]);

  useEffect(() => {
    if (tab === 'organic' && token && !organicData && !organicLoading) loadOrganic();
  }, [tab]);

  useEffect(() => {
    if (tab === 'organic' && token) { setOrganicData(null); }
  }, [brand, datePreset]);

  if (!token) return <TokenScreen onSave={setToken} brand={brand} />;

  const tabs = [
    { id: 'overview', label: 'Overview' },
    { id: 'campaigns', label: 'Campaigns' },
    { id: 'adsets', label: 'Ad Sets' },
    { id: 'creative', label: 'Creative Performance (Ads)' },
    { id: 'video', label: 'Video Performance' },
    { id: 'breakdowns', label: 'Breakdowns' },
    { id: 'organic', label: '📸 Organic' },
  ];

  const attrOptions = [
    { value: '7d_click', label: '7-day click' },
    { value: '1d_click', label: '1-day click' },
    { value: '28d_click', label: '28-day click' },
    { value: '7d_view', label: '7-day view' },
    { value: '1d_view', label: '1-day view' },
  ];

  const dateOptions = [
    { value: 'today', label: 'Today' },
    { value: 'yesterday', label: 'Yesterday' },
    { value: 'last_7d', label: 'Last 7 Days' },
    { value: 'last_14d', label: 'Last 14 Days' },
    { value: 'last_30d', label: 'Last 30 Days' },
    { value: 'last_90d', label: 'Last 90 Days' },
    { value: 'this_month', label: 'This Month' },
    { value: 'last_month', label: 'Last Month' },
    { value: 'last_12m', label: 'Last 12 Months' },
    { value: 'custom', label: 'Custom Range' },
  ];

  return (
    <div className="min-h-screen" style={{background: '#f8f8fa'}}>
      {loading && <LoadingOverlay brand={brand} />}

      {/* Header */}
      <header className="sticky top-0 z-40 bg-white/80 backdrop-blur-md" style={{boxShadow: '0 1px 3px rgba(0,0,0,.08)'}}>
        <div className="max-w-[1600px] mx-auto px-3 sm:px-6">
          <div className="flex items-center justify-between h-14 sm:h-16">
            <div className="flex items-center gap-3 sm:gap-4">
              <img src={b.logoDark} alt={b.name} className="h-5 sm:h-7 w-auto object-contain" />
              <div className="h-5 w-px bg-gray-200 hidden sm:block" />
              <h1 className="font-display text-sm sm:text-base font-bold text-gray-900 hidden sm:block">Social Performance</h1>
            </div>

            <div className="flex items-center gap-2 sm:gap-3">
              {/* Brand Toggle */}
              <div className="flex rounded-lg overflow-hidden border" style={{borderColor: '#e5e7eb'}}>
                {Object.entries(BRANDS).map(([key, val]) => (
                  <button
                    key={key}
                    onClick={() => handleBrandSwitch(key)}
                    className="px-2.5 sm:px-3.5 py-1 sm:py-1.5 text-xs font-semibold uppercase tracking-wider transition-all"
                    style={{
                      backgroundColor: brand === key ? b.primary : 'transparent',
                      color: brand === key ? '#fff' : '#6b7280',
                    }}
                  >
                    {key === 'gaf' ? 'GAF' : key === 'revel' ? 'Revel' : 'Force USA'}
                  </button>
                ))}
              </div>

            </div>
          </div>
        </div>
      </header>

      {/* Controls Bar */}
      <div className="max-w-[1600px] mx-auto px-3 sm:px-6 mt-4 sm:mt-5">
        <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
          {/* Tabs */}
          <nav className="flex items-center gap-1 overflow-x-auto scrollbar-thin bg-white rounded-xl p-1" style={{boxShadow: '0 1px 2px rgba(0,0,0,.04)', border: '1px solid rgba(0,0,0,.04)'}}>
            {tabs.map(t => (
              <button
                key={t.id}
                onClick={() => setTab(t.id)}
                className="px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm font-semibold rounded-lg whitespace-nowrap transition-all"
                style={{
                  backgroundColor: tab === t.id ? b.primary : 'transparent',
                  color: tab === t.id ? '#ffffff' : '#6b7280',
                }}
              >
                {t.label}
              </button>
            ))}
          </nav>

          {/* Attribution + Date + Refresh */}
          <div className="flex items-center gap-2 flex-shrink-0">
            <select
              value={attrWindow}
              onChange={e => setAttrWindow(e.target.value)}
              className="px-2 sm:px-3 py-1.5 sm:py-2 text-xs sm:text-sm border rounded-lg bg-white focus:outline-none"
              style={{borderColor: '#e5e7eb'}}
              title="Attribution window"
            >
              {attrOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
            </select>
            <div className="h-4 w-px bg-gray-200 hidden sm:block" />
            <select
              value={datePreset}
              onChange={e => setDatePreset(e.target.value)}
              className="px-2 sm:px-3 py-1.5 sm:py-2 text-xs sm:text-sm border rounded-lg bg-white focus:outline-none flex-1 sm:flex-none"
              style={{borderColor: '#e5e7eb'}}
            >
              {dateOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
            </select>

            {datePreset === 'custom' && (
              <div className="flex items-center gap-1">
                <input
                  type="date"
                  value={customDates.since}
                  onChange={e => setCustomDates(p => ({...p, since: e.target.value}))}
                  className="px-1.5 sm:px-2 py-1.5 text-xs sm:text-sm border rounded-lg w-28 sm:w-auto"
                  style={{borderColor: '#e5e7eb'}}
                />
                <span className="text-gray-400 text-xs">to</span>
                <input
                  type="date"
                  value={customDates.until}
                  onChange={e => setCustomDates(p => ({...p, until: e.target.value}))}
                  className="px-1.5 sm:px-2 py-1.5 text-xs sm:text-sm border rounded-lg w-28 sm:w-auto"
                  style={{borderColor: '#e5e7eb'}}
                />
              </div>
            )}

            <button
              onClick={() => { if (tab === 'organic') { setOrganicData(null); setTimeout(loadOrganic, 50); } else { fetchData(); } }}
              disabled={loading || organicLoading}
              className="inline-flex items-center gap-1.5 px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm font-semibold text-white rounded-lg transition-all hover:opacity-90 disabled:opacity-50"
              style={{backgroundColor: b.primary}}
            >
              {Icons.refresh}
              Refresh
            </button>
          </div>
        </div>
      </div>

      {/* Error Banner */}
      {error && (
        <div className="max-w-[1600px] mx-auto px-4 sm:px-6 mt-4">
          <div className="dash-card bg-red-50 px-4 py-3 flex items-center justify-between">
            <span className="text-sm text-red-700">{error}</span>
            <button onClick={() => setError(null)} className="text-red-400 hover:text-red-600 text-sm">Dismiss</button>
          </div>
        </div>
      )}

      {/* Last Refreshed */}
      {lastRefresh && (
        <div className="max-w-[1600px] mx-auto px-3 sm:px-6 mt-2 sm:mt-3">
          <p className="text-[10px] sm:text-xs text-gray-400">
            Last refreshed: {lastRefresh.toLocaleTimeString()} ({getDateRange(datePreset, customDates).since} to {getDateRange(datePreset, customDates).until}) &middot; Attribution: {attrOptions.find(o => o.value === attrWindow)?.label}
          </p>
        </div>
      )}

      {/* Content */}
      <main className="max-w-[1600px] mx-auto px-3 sm:px-6 py-4 sm:py-6">
        {!data && !loading && !error && (
          <div className="text-center py-20 text-gray-400">
            <p className="text-sm">Click Refresh to pull data</p>
          </div>
        )}
        {tab === 'overview' && data && <OverviewTab data={data} brand={brand} datePreset={datePreset} />}
        {tab === 'campaigns' && data && <CampaignsTab data={data} brand={brand} />}
        {tab === 'adsets' && data && <AdSetsTab data={data} brand={brand} />}
        {tab === 'creative' && data && <CreativeTab data={data} brand={brand} />}
        {tab === 'video' && data && <VideoTab data={data} brand={brand} />}
        {tab === 'breakdowns' && data && <BreakdownsTab data={data} brand={brand} />}
        {tab === 'organic' && <OrganicTab organicData={organicData} organicLoading={organicLoading} brand={brand} datePreset={datePreset} />}
      </main>

      {/* Footer */}
      <footer className="py-3 sm:py-4 mt-6 sm:mt-8">
        <div className="max-w-[1600px] mx-auto px-3 sm:px-6 flex flex-col sm:flex-row items-center justify-between gap-1">
          <span className="text-[10px] sm:text-xs text-gray-300">Paid data: Meta Marketing API v21.0 · Organic data: Instagram Graph API v21.0</span>
          <span className="text-[10px] sm:text-xs text-gray-300">Token stored locally in browser only</span>
        </div>
      </footer>
    </div>
  );
}

// ─── Mount ───
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
