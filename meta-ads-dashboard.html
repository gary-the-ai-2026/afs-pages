// ─── Helpers ───
const fmt = {
  currency: (v) => {
    const n = parseFloat(v) || 0;
    if (n >= 1000000) return '$' + (n/1000000).toFixed(1) + 'M';
    if (n >= 10000) return '$' + (n/1000).toFixed(1) + 'K';
    return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  },
  number: (v) => {
    const n = parseFloat(v) || 0;
    if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n/1000).toFixed(1) + 'K';
    return n.toLocaleString();
  },
  pct: (v) => (parseFloat(v) || 0).toFixed(2) + '%',
  decimal: (v) => (parseFloat(v) || 0).toFixed(2),
  roas: (v) => (parseFloat(v) || 0).toFixed(2) + 'x',
};

function getActionValue(actions, type) {
  if (!actions) return 0;
  const a = actions.find(x => x.action_type === type);
  return a ? parseFloat(a.value) : 0;
}

function getDateRange(preset, custom) {
  const today = new Date();
  const pad = d => d.toISOString().slice(0,10);
  const daysAgo = n => { const d = new Date(today); d.setDate(d.getDate() - n); return d; };
  switch(preset) {
    case 'today': return { since: pad(today), until: pad(today) };
    case 'yesterday': return { since: pad(daysAgo(1)), until: pad(daysAgo(1)) };
    case 'last_7d': return { since: pad(daysAgo(6)), until: pad(today) };
    case 'last_14d': return { since: pad(daysAgo(13)), until: pad(today) };
    case 'last_30d': return { since: pad(daysAgo(29)), until: pad(today) };
    case 'this_month': {
      const start = new Date(today.getFullYear(), today.getMonth(), 1);
      return { since: pad(start), until: pad(today) };
    }
    case 'last_month': {
      const start = new Date(today.getFullYear(), today.getMonth() - 1, 1);
      const end = new Date(today.getFullYear(), today.getMonth(), 0);
      return { since: pad(start), until: pad(end) };
    }
    case 'custom': return { since: custom.since, until: custom.until };
    default: return { since: pad(daysAgo(29)), until: pad(today) };
  }
}

async function apiFetch(path, token) {
  const sep = path.includes('?') ? '&' : '?';
  const url = `${META_API}${path}${sep}access_token=${token}`;
  const res = await fetch(url);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API error ${res.status}`);
  }
  return res.json();
}

async function fetchAllPages(path, token, maxPages = 50) {
  let all = [];
  let url = `${META_API}${path}${path.includes('?') ? '&' : '?'}access_token=${token}`;
  let page = 0;
  while (url && page < maxPages) {
    const res = await fetch(url);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `API error ${res.status}`);
    }
    const json = await res.json();
    all = all.concat(json.data || []);
    url = json.paging?.next || null;
    page++;
  }
  return all;
}

async function fetchInsights(accountId, level, since, until, token) {
  const fields = 'campaign_name,campaign_id,adset_name,adset_id,ad_name,ad_id,spend,impressions,reach,cpm,clicks,ctr,cpc,frequency,outbound_clicks,actions,cost_per_action_type,action_values';
  const timeRange = JSON.stringify({since, until});
  return fetchAllPages(
    `/${accountId}/insights?fields=${fields}&level=${level}&time_range=${timeRange}&limit=500&filtering=[{"field":"spend","operator":"GREATER_THAN","value":"0"}]`,
    token
  );
}

async function fetchAdsCreatives(adIds, token) {
  if (!adIds || adIds.length === 0) return [];
  const batchSize = 50;
  const allAds = [];
  for (let i = 0; i < adIds.length; i += batchSize) {
    const batch = adIds.slice(i, i + batchSize);
    const ids = batch.join(',');
    const res = await fetch(`${META_API}/?ids=${ids}&fields=id,name,status,creative{id}&access_token=${token}`);
    if (!res.ok) continue;
    const json = await res.json();
    allAds.push(...Object.values(json));
  }
  const adCreativeMap = {};
  const creativeIds = [];
  allAds.forEach(ad => {
    if (ad.creative?.id) {
      adCreativeMap[ad.id] = ad.creative.id;
      if (!creativeIds.includes(ad.creative.id)) creativeIds.push(ad.creative.id);
    }
  });
  const creativeDetails = {};
  for (let i = 0; i < creativeIds.length; i += batchSize) {
    const batch = creativeIds.slice(i, i + batchSize);
    const ids = batch.join(',');
    const res = await fetch(`${META_API}/?ids=${ids}&fields=thumbnail_url,image_url,body,title,name&thumbnail_width=480&thumbnail_height=480&access_token=${token}`);
    if (!res.ok) continue;
    const json = await res.json();
    Object.values(json).forEach(c => { creativeDetails[c.id] = c; });
  }
  return allAds.map(ad => ({
    ...ad,
    creative: creativeDetails[adCreativeMap[ad.id]] || ad.creative
  }));
}

// ─── Comparison & Daily Fetch ───
function getComparisonRange(since, until) {
  const s = new Date(since), e = new Date(until);
  const days = Math.round((e - s) / 86400000);
  const compEnd = new Date(s); compEnd.setDate(compEnd.getDate() - 1);
  const compStart = new Date(compEnd); compStart.setDate(compStart.getDate() - days);
  return { since: compStart.toISOString().slice(0,10), until: compEnd.toISOString().slice(0,10) };
}

}

const OBJECTIVE_MAP = {
  OUTCOME_SALES: 'conversion', CONVERSIONS: 'conversion', CATALOG_SALES: 'conversion', PRODUCT_CATALOG_SALES: 'conversion',
  OUTCOME_TRAFFIC: 'traffic', LINK_CLICKS: 'traffic',
  OUTCOME_AWARENESS: 'awareness', REACH: 'awareness', BRAND_AWARENESS: 'awareness',
  OUTCOME_ENGAGEMENT: 'engagement', POST_ENGAGEMENT: 'engagement', VIDEO_VIEWS: 'engagement',
  OUTCOME_LEADS: 'leads', LEAD_GENERATION: 'leads',
};

function classifyCampaign(row, avgMetrics, objective) {
  const goal = OBJECTIVE_MAP[objective] || null;
  const spend = parseFloat(row.spend || 0);
  const conversions = getActionValue(row.actions, 'purchase') + getActionValue(row.actions, 'omni_purchase');
  const revenue = getActionValue(row.action_values, 'purchase') + getActionValue(row.action_values, 'omni_purchase');
  const roas = spend > 0 ? revenue / spend : 0;
  const ctr = parseFloat(row.ctr || 0);
  const cpm = parseFloat(row.cpm || 0);

  let metric, val, avg, label, lowerBetter = false;

  if (goal === 'conversion' || goal === 'leads' || (!goal && conversions > 0)) {
    metric = 'ROAS'; val = roas; avg = avgMetrics.roas; label = fmt.roas(roas);
  } else if (goal === 'traffic') {
    metric = 'CTR'; val = ctr; avg = avgMetrics.ctr; label = fmt.pct(ctr);
  } else if (goal === 'awareness') {
    metric = 'CPM'; val = cpm; avg = avgMetrics.cpm; label = fmt.currency(cpm); lowerBetter = true;
  } else if (goal === 'engagement') {
    metric = 'CTR'; val = ctr; avg = avgMetrics.ctr; label = fmt.pct(ctr);
  } else {
    if (conversions > 0) { metric = 'ROAS'; val = roas; avg = avgMetrics.roas; label = fmt.roas(roas); }
    else { metric = 'CTR'; val = ctr; avg = avgMetrics.ctr; label = fmt.pct(ctr); }
  }

  let tier;
  if (lowerBetter) {
    tier = val <= avg * 0.6 ? 'win' : val <= avg * 1.5 ? 'watch' : 'waste';
  } else {
    tier = val >= avg * 1.0 ? 'win' : val >= avg * 0.5 ? 'watch' : 'waste';
  }

  if (spend < 50) tier = 'watch';

  return { tier, metric, label };
}

// ─── KPI Card ───
function KpiCard({ label, value, icon, brand, delta, invertDelta }) {
  const b = BRANDS[brand];
  const hasDelta = delta !== undefined && delta !== null && isFinite(delta);
  const isPositive = invertDelta ? delta < 0 : delta > 0;
  const isNeutral = hasDelta && Math.abs(delta) < 0.5;
  return (
    <div className="dash-card p-3 sm:p-5 transition-all group">
      <div className="flex items-center gap-1.5 sm:gap-2 mb-1.5 sm:mb-2">
        <span className="text-[10px] sm:text-xs font-medium text-gray-400 uppercase tracking-wider leading-tight">{label}</span>
      </div>
      <div className="text-lg sm:text-2xl font-bold text-gray-900 font-display tabular-nums">{value}</div>
      {hasDelta && (
        <div className={`flex items-center gap-1 mt-1.5 ${isNeutral ? 'text-gray-400' : isPositive ? 'text-emerald-600' : 'text-red-500'}`}>
          <span className="text-[10px] sm:text-xs font-semibold tabular-nums">
            {delta > 0 ? '+' : ''}{delta.toFixed(1)}%
          </span>
          <span className="text-[9px] text-gray-400">vs prev</span>
        </div>
      )}
    </div>
  );
}

// ─── Trend Chart ───
function TrendChart({ dailyData, brand }) {
  const [metric, setMetric] = useState('spend');
  const [hover, setHover] = useState(null);
  const b = BRANDS[brand];

  const metricDefs = [
    { key: 'spend', label: 'Spend', format: fmt.currency },
    { key: 'roas', label: 'ROAS', format: fmt.roas },
    { key: 'purchases', label: 'Purchases', format: fmt.number },
    { key: 'cpm', label: 'CPM', format: fmt.currency },
    { key: 'ctr', label: 'CTR', format: fmt.pct },
  ];

  const points = useMemo(() => {
    return (dailyData || []).map(d => {
      const spend = parseFloat(d.spend || 0);
      const purchases = getActionValue(d.actions, 'purchase') + getActionValue(d.actions, 'omni_purchase');
      const revenue = getActionValue(d.action_values, 'purchase') + getActionValue(d.action_values, 'omni_purchase');
      return {
        date: d.date_start,
        spend,
        impressions: parseInt(d.impressions || 0),
        reach: parseInt(d.reach || 0),
        clicks: parseInt(d.clicks || 0),
        ctr: parseFloat(d.ctr || 0),
        cpm: parseFloat(d.cpm || 0),
        purchases,
        revenue,
        roas: spend > 0 ? revenue / spend : 0,
      };
    });
  }, [dailyData]);

  if (points.length < 2) return null;

  const W = 800, H = 220;
  const PAD = { top: 20, right: 20, bottom: 30, left: 60 };
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top - PAD.bottom;

  const values = points.map(p => p[metric]);
  const max = Math.max(...values, 0.01);
  const min = Math.min(...values, 0);
  const range = max - min || 1;
  const avg = values.reduce((a, c) => a + c, 0) / values.length;
  const fmtFn = metricDefs.find(m => m.key === metric)?.format || fmt.number;

  const getX = i => PAD.left + (i / (points.length - 1)) * chartW;
  const getY = v => PAD.top + chartH - ((v - min) / range) * chartH;

  const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${getX(i)},${getY(p[metric])}`).join(' ');
  const areaD = pathD + ` L${getX(points.length-1)},${PAD.top + chartH} L${PAD.left},${PAD.top + chartH} Z`;
  const avgY = getY(avg);

  const labelEvery = Math.max(1, Math.floor(points.length / 7));

  return (
    <div className="dash-card p-5 sm:p-6">
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
        <h3 className="font-display text-lg font-bold text-gray-900">Performance Trend</h3>
        <div className="flex gap-1 flex-wrap">
          {metricDefs.map(m => (
            <button key={m.key} onClick={() => setMetric(m.key)}
              className={`px-2.5 py-1 text-xs font-medium rounded-md transition-colors ${metric === m.key ? 'text-white' : 'text-gray-500 hover:bg-gray-100'}`}
              style={metric === m.key ? { backgroundColor: b.primary } : {}}
            >{m.label}</button>
          ))}
        </div>
      </div>
      <div className="relative">
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{maxHeight: '280px'}}>
          {[0, 0.25, 0.5, 0.75, 1].map(frac => {
            const y = PAD.top + chartH * (1 - frac);
            return (
              <g key={frac}>
                <line x1={PAD.left} y1={y} x2={PAD.left + chartW} y2={y} stroke="#f0f0f2" strokeWidth="1" />
                <text x={PAD.left - 8} y={y + 4} textAnchor="end" fill="#9ca3af" fontSize="9" fontFamily="Open Sans">{fmtFn(min + range * frac)}</text>
              </g>
            );
          })}
          {points.map((p, i) => (i % labelEvery === 0 || i === points.length - 1) ? (
            <text key={i} x={getX(i)} y={H - 5} textAnchor="middle" fill="#9ca3af" fontSize="9" fontFamily="Open Sans">
              {new Date(p.date + 'T00:00:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short' })}
            </text>
          ) : null)}
          <line x1={PAD.left} y1={avgY} x2={PAD.left + chartW} y2={avgY} stroke={b.primary} strokeWidth="1" strokeDasharray="6 4" opacity="0.4" />
          <path d={areaD} fill={b.primary} opacity="0.07" />
          <path d={pathD} fill="none" stroke={b.primary} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
          {points.length <= 60 && points.map((p, i) => (
            <circle key={i} cx={getX(i)} cy={getY(p[metric])} r={hover === i ? 5 : 3} fill={hover === i ? b.primary : 'white'} stroke={b.primary} strokeWidth="2" />
          ))}
          {points.map((p, i) => (
            <rect key={'h'+i} x={getX(i) - chartW / points.length / 2} y={PAD.top} width={chartW / points.length} height={chartH}
              fill="transparent" onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} />
          ))}
          {hover !== null && (
            <g>
              <line x1={getX(hover)} y1={PAD.top} x2={getX(hover)} y2={PAD.top + chartH} stroke={b.primary} strokeWidth="1" opacity="0.3" />
              <rect x={getX(hover) - 45} y={getY(points[hover][metric]) - 28} width="90" height="22" rx="6" fill="#1f2937" opacity="0.9" />
              <text x={getX(hover)} y={getY(points[hover][metric]) - 14} textAnchor="middle" fill="white" fontSize="10" fontFamily="Open Sans" fontWeight="600">{fmtFn(points[hover][metric])}</text>
            </g>
          )}
        </svg>
      </div>
      <div className="flex items-center gap-6 mt-3 pt-3 border-t" style={{borderColor: '#f0f0f2'}}>
        <div><span className="text-[10px] text-gray-400 uppercase tracking-wider">Avg</span><span className="text-sm font-bold text-gray-700 ml-2 tabular-nums">{fmtFn(avg)}</span></div>
        <div><span className="text-[10px] text-gray-400 uppercase tracking-wider">Peak</span><span className="text-sm font-bold text-gray-700 ml-2 tabular-nums">{fmtFn(max)}</span></div>
        <div><span className="text-[10px] text-gray-400 uppercase tracking-wider">Low</span><span className="text-sm font-bold text-gray-700 ml-2 tabular-nums">{fmtFn(min)}</span></div>
      </div>
    </div>
  );
}

// ─── Sortable Table ───
function SortableTable({ columns, data, brand, onRowClick }) {
  const [sortCol, setSortCol] = useState(null);
  const [sortDir, setSortDir] = useState('desc');
  const b = BRANDS[brand];

  const sorted = useMemo(() => {
    if (!sortCol) return data;
    return [...data].sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (typeof va === 'string' && !isNaN(parseFloat(va))) { va = parseFloat(va); vb = parseFloat(vb); }
      if (typeof va === 'number' || typeof va === 'undefined') {
        va = va || 0; vb = vb || 0;
        return sortDir === 'asc' ? va - vb : vb - va;
      }
      return sortDir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
    });
  }, [data, sortCol, sortDir]);

  const handleSort = (key) => {
    if (sortCol === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(key); setSortDir('desc'); }
  };

  return (
    <div className="overflow-x-auto scrollbar-thin dash-card">
      <table className="w-full text-sm">
        <thead>
          <tr className="border-b" style={{borderColor: '#f0f0f2'}}>
            {columns.map(col => (
              <th key={col.key}
                onClick={() => col.sortable !== false && handleSort(col.key)}
                className={`px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-gray-400 whitespace-nowrap ${col.sortable !== false ? 'cursor-pointer hover:text-gray-600 select-none' : ''} ${col.align === 'right' ? 'text-right' : ''}`}
              >
                <span className="inline-flex items-center gap-1">
                  {col.label}
                  {sortCol === col.key && <span className={`transition-transform ${sortDir === 'asc' ? 'rotate-180' : ''}`}>{Icons.sort}</span>}
                </span>
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {sorted.length === 0 ? (
            <tr><td colSpan={columns.length} className="px-4 py-12 text-center text-gray-400">No data for selected period</td></tr>
          ) : sorted.map((row, i) => (
            <tr key={i}
              onClick={() => onRowClick?.(row)}
              className={`border-b last:border-0 hover:bg-gray-50 transition-colors ${onRowClick ? 'cursor-pointer' : ''}`}
              style={{borderColor: '#f0f0f2'}}
            >
              {columns.map(col => (
                <td key={col.key} className={`px-4 py-3 whitespace-nowrap ${col.align === 'right' ? 'text-right tabular-nums' : ''} ${col.bold ? 'font-semibold text-gray-900' : 'text-gray-600'}`}>
                  {col.render ? col.render(row[col.key], row) : row[col.key]}
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ─── Overview Tab ───
function OverviewTab({ data, brand }) {
  if (!data?.campaignInsights?.length) return <EmptyState brand={brand} />;

  const sumInsights = (rows) => {
    const t = { spend: 0, impressions: 0, reach: 0, clicks: 0, conversions: 0, revenue: 0, outboundClicks: 0 };
    rows.forEach(r => {
      t.spend += parseFloat(r.spend || 0);
      t.impressions += parseInt(r.impressions || 0);
      t.reach += parseInt(r.reach || 0);
      t.clicks += parseInt(r.clicks || 0);
      t.conversions += getActionValue(r.actions, 'purchase') + getActionValue(r.actions, 'omni_purchase');
      t.revenue += getActionValue(r.action_values, 'purchase') + getActionValue(r.action_values, 'omni_purchase');
      t.outboundClicks += getActionValue(r.outbound_clicks, 'outbound_click');
    });
    return t;
  };

  const totals = useMemo(() => sumInsights(data.campaignInsights), [data]);
  const prevTotals = useMemo(() => data.compInsights?.length ? sumInsights(data.compInsights) : null, [data]);

  const pctChange = (cur, prev) => prev && prev !== 0 ? ((cur - prev) / Math.abs(prev)) * 100 : undefined;

  const kpis = [
    { label: 'Total Spend', value: fmt.currency(totals.spend), delta: pctChange(totals.spend, prevTotals?.spend) },
    { label: 'Impressions', value: fmt.number(totals.impressions), delta: pctChange(totals.impressions, prevTotals?.impressions) },
    { label: 'Reach', value: fmt.number(totals.reach), delta: pctChange(totals.reach, prevTotals?.reach) },
    { label: 'Clicks', value: fmt.number(totals.clicks), delta: pctChange(totals.clicks, prevTotals?.clicks) },
    { label: 'CTR', value: fmt.pct(totals.clicks / totals.impressions * 100), delta: pctChange(totals.clicks / totals.impressions, prevTotals ? prevTotals.clicks / (prevTotals.impressions || 1) : undefined) },
    { label: 'CPC', value: fmt.currency(totals.spend / totals.clicks), delta: pctChange(totals.spend / totals.clicks, prevTotals ? prevTotals.spend / (prevTotals.clicks || 1) : undefined), invertDelta: true },
    { label: 'CPM', value: fmt.currency(totals.spend / totals.impressions * 1000), delta: pctChange(totals.spend / totals.impressions, prevTotals ? prevTotals.spend / (prevTotals.impressions || 1) : undefined), invertDelta: true },
    { label: 'Outbound Clicks', value: fmt.number(totals.outboundClicks), delta: pctChange(totals.outboundClicks, prevTotals?.outboundClicks) },
    { label: 'Conversions', value: fmt.number(totals.conversions), delta: pctChange(totals.conversions, prevTotals?.conversions) },
    { label: 'Cost / Conv.', value: totals.conversions > 0 ? fmt.currency(totals.spend / totals.conversions) : '-', delta: totals.conversions > 0 && prevTotals?.conversions > 0 ? pctChange(totals.spend / totals.conversions, prevTotals.spend / prevTotals.conversions) : undefined, invertDelta: true },
    { label: 'Revenue', value: fmt.currency(totals.revenue), delta: pctChange(totals.revenue, prevTotals?.revenue) },
    { label: 'ROAS', value: totals.spend > 0 ? fmt.roas(totals.revenue / totals.spend) : '-', delta: totals.spend > 0 && prevTotals?.spend > 0 ? pctChange(totals.revenue / totals.spend, prevTotals.revenue / prevTotals.spend) : undefined },
  ];

  const b = BRANDS[brand];

  const objMap = useMemo(() => {
    const m = {};
    (data.campaignMeta || []).forEach(c => { m[c.id] = c.objective; });
    return m;
  }, [data]);

  const avgMetrics = useMemo(() => {
    const ci = data.campaignInsights;
    const median = arr => { const s = [...arr].sort((a,b) => a - b); const m = Math.floor(s.length / 2); return s.length % 2 ? s[m] : (s[m-1] + s[m]) / 2; };
    const roasVals = ci.map(r => { const sp = parseFloat(r.spend || 0); const rev = getActionValue(r.action_values, 'purchase') + getActionValue(r.action_values, 'omni_purchase'); return sp > 0 ? rev / sp : 0; }).filter(v => v > 0);
    const ctrVals = ci.map(r => parseFloat(r.ctr || 0)).filter(v => v > 0);
    const cpmVals = ci.map(r => parseFloat(r.cpm || 0)).filter(v => v > 0);
    return {
      roas: roasVals.length ? median(roasVals) : 0,
      ctr: ctrVals.length ? median(ctrVals) : 0,
      cpm: cpmVals.length ? median(cpmVals) : 0,
    };
  }, [data]);

  const tieredCampaigns = useMemo(() => {
    return data.campaignInsights.map(r => {
      const objective = objMap[r.campaign_id] || '';
      const tier = classifyCampaign(r, avgMetrics, objective);
      const spend = parseFloat(r.spend || 0);
      const conversions = getActionValue(r.actions, 'purchase') + getActionValue(r.actions, 'omni_purchase');
      const revenue = getActionValue(r.action_values, 'purchase') + getActionValue(r.action_values, 'omni_purchase');
      return { ...tier, name: r.campaign_name, spend, conversions, revenue, roas: spend > 0 ? revenue / spend : 0, ctr: parseFloat(r.ctr || 0), cpm: parseFloat(r.cpm || 0), objective };
    }).sort((a, b) => b.spend - a.spend);
  }, [data, objMap, avgMetrics]);

  const tierGroups = { win: [], watch: [], waste: [] };
  tieredCampaigns.forEach(c => tierGroups[c.tier].push(c));
  const wasteSpend = tierGroups.waste.reduce((s, c) => s + c.spend, 0);

  const scaleWinners = useMemo(() => {
    return (data.adsetInsights || []).map(r => {
      const spend = parseFloat(r.spend || 0);
      const conversions = getActionValue(r.actions, 'purchase') + getActionValue(r.actions, 'omni_purchase');
      const revenue = getActionValue(r.action_values, 'purchase') + getActionValue(r.action_values, 'omni_purchase');
      const roas = spend > 0 ? revenue / spend : 0;
      return { name: r.adset_name, campaign: r.campaign_name, spend, conversions, revenue, roas, ctr: parseFloat(r.ctr || 0), cpm: parseFloat(r.cpm || 0) };
    }).filter(r => r.roas > avgMetrics.roas && r.conversions >= 2 && r.spend >= 200)
      .sort((a, b) => b.roas - a.roas)
      .slice(0, 5);
  }, [data, avgMetrics]);

  const tierColors = { win: '#059669', watch: '#d97706', waste: '#dc2626' };
  const tierLabels = { win: 'Win', watch: 'Watch', waste: 'Waste' };

  return (
    <div className="space-y-6 fade-in">
      {/* KPI Cards */}
      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-2 sm:gap-3 stagger">
        {kpis.map(k => <KpiCard key={k.label} {...k} brand={brand} />)}
      </div>

      {/* Trend Chart */}
      {data.dailyInsights?.length > 1 && <TrendChart dailyData={data.dailyInsights} brand={brand} />}

      {/* Budget Waste Alert */}
      {wasteSpend > 0 && (
        <div className="dash-card border-l-4 p-4 sm:p-5" style={{borderLeftColor: '#dc2626'}}>
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 rounded-lg bg-red-50 flex items-center justify-center">
              <svg className="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z" /></svg>
            </div>
            <div>
              <h4 className="font-display text-sm font-bold text-gray-900">Budget at risk: {fmt.currency(wasteSpend)}</h4>
              <p className="text-xs text-gray-500 mt-0.5">{tierGroups.waste.length} campaign{tierGroups.waste.length !== 1 ? 's' : ''} underperforming relative to their objective. Review or reallocate.</p>
            </div>
          </div>
        </div>
      )}

      {/* Campaign Performance Tiers */}
      <div className="dash-card p-5 sm:p-6">
        <div className="flex items-center gap-3 mb-5">
          <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{backgroundColor: b.primary}}>
            <svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
          </div>
          <h3 className="font-display text-lg font-bold text-gray-900">Campaign Performance</h3>
          <div className="flex gap-2 ml-auto">
            {['win','watch','waste'].map(t => (
              <span key={t} className="flex items-center gap-1 text-[10px] font-semibold uppercase tracking-wider" style={{color: tierColors[t]}}>
                <span className="w-2 h-2 rounded-full" style={{backgroundColor: tierColors[t]}} /> {tierLabels[t]} ({tierGroups[t].length})
              </span>
            ))}
          </div>
        </div>
        <div className="space-y-2.5">
          {tieredCampaigns.map((c, i) => {
            const maxSpend = tieredCampaigns[0]?.spend || 1;
            const pct = (c.spend / maxSpend) * 100;
            return (
              <div key={i} className="group">
                <div className="flex items-center justify-between mb-1 gap-2">
                  <div className="flex items-center gap-2 min-w-0 flex-1">
                    <span className="w-2 h-2 rounded-full flex-shrink-0" style={{backgroundColor: tierColors[c.tier]}} />
                    <span className="text-sm font-medium text-gray-700 truncate">{c.name}</span>
                    <TierBadge tier={c.tier} metric={c.metric} label={c.label} />
                  </div>
                  <div className="flex items-center gap-4 text-xs text-gray-500 flex-shrink-0">
                    <span>{fmt.currency(c.spend)}</span>
                    <span>{c.conversions > 0 ? fmt.number(c.conversions) + ' conv.' : '-'}</span>
                    <span>{c.roas > 0 ? fmt.roas(c.roas) + ' ROAS' : '-'}</span>
                  </div>
                </div>
                <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                  <div className="h-full rounded-full transition-all duration-700" style={{width: pct + '%', backgroundColor: tierColors[c.tier]}} />
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Scale Winners */}
      {scaleWinners.length > 0 && (
        <div className="dash-card p-5 sm:p-6">
          <div className="flex items-center gap-3 mb-5">
            <div className="w-8 h-8 rounded-lg bg-emerald-50 flex items-center justify-center">
              <svg className="w-4 h-4 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
            </div>
            <div>
              <h3 className="font-display text-lg font-bold text-gray-900">Scale Winners</h3>
              <p className="text-xs text-gray-400">Ad sets above avg ROAS with 2+ purchases and $200+ spend</p>
            </div>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-3">
            {scaleWinners.map((w, i) => (
              <div key={i} className="rounded-xl border border-emerald-100 bg-emerald-50/30 p-3.5">
                <h4 className="text-xs font-semibold text-gray-900 truncate leading-tight">{w.name}</h4>
                <p className="text-[10px] text-gray-400 truncate mt-0.5 mb-3">{w.campaign}</p>
                <div className="text-xl font-bold font-display tabular-nums text-emerald-600 mb-2">{fmt.roas(w.roas)}</div>
                <div className="grid grid-cols-2 gap-1.5 text-center">
                  <div className="bg-white rounded-md py-1.5"><div className="text-[8px] text-gray-400 uppercase">Spend</div><div className="text-[10px] font-semibold text-gray-700">{fmt.currency(w.spend)}</div></div>
                  <div className="bg-white rounded-md py-1.5"><div className="text-[8px] text-gray-400 uppercase">Conv.</div><div className="text-[10px] font-semibold text-gray-700">{fmt.number(w.conversions)}</div></div>
                  <div className="bg-white rounded-md py-1.5"><div className="text-[8px] text-gray-400 uppercase">Revenue</div><div className="text-[10px] font-semibold text-gray-700">{fmt.currency(w.revenue)}</div></div>
                  <div className="bg-white rounded-md py-1.5"><div className="text-[8px] text-gray-400 uppercase">CTR</div><div className="text-[10px] font-semibold text-gray-700">{fmt.pct(w.ctr)}</div></div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Campaign Tab ───
function CampaignsTab({ data, brand }) {

  const [statusFilter, setStatusFilter] = useState('all');
  const rows = useMemo(() => data.campaignInsights.map(r => {

    const costPerConv = getActionValue(r.cost_per_action_type, 'purchase') + getActionValue(r.cost_per_action_type, 'omni_purchase');
    const outbound = getActionValue(r.outbound_clicks, 'outbound_click');
    return {
      name: r.campaign_name,

      cpm: parseFloat(r.cpm || 0),

    { key: 'reach', label: 'Reach', align: 'right', sortable: true, render: v => fmt.number(v) },
    { key: 'clicks', label: 'Clicks', align: 'right', sortable: true, render: v => fmt.number(v) },
    { key: 'ctr', label: 'CTR', align: 'right', sortable: true, render: v => fmt.pct(v) },
    { key: 'cpc', label: 'CPC', align: 'right', sortable: true, render: v => fmt.currency(v) },
    { key: 'cpm', label: 'CPM', align: 'right', sortable: true, render: v => fmt.currency(v) },
    { key: 'outboundClicks', label: 'Outbound', align: 'right', sortable: true, render: v => fmt.number(v) },
    { key: 'frequency', label: 'Freq.', align: 'right', sortable: true, render: v => fmt.decimal(v) },
    { key: 'conversions', label: 'Conv.', align: 'right', sortable: true, render: v => v > 0 ? fmt.number(v) : '-' },
    { key: 'costPerConv', label: 'CPA', align: 'right', sortable: true, render: v => v > 0 ? fmt.currency(v) : '-' },
    { key: 'revenue', label: 'Revenue', align: 'right', sortable: true, render: v => v > 0 ? fmt.currency(v) : '-' },
    { key: 'roas', label: 'ROAS', align: 'right', sortable: true, render: v => v > 0 ? fmt.roas(v) : '-' },
  ];

// ─── Creative Performance Tab ───
function CreativeTab({ data, brand }) {
  if (!data?.adInsights?.length) return <EmptyState brand={brand} />;
  const [sortMetric, setSortMetric] = useState('roas');
  const [campaignFilter, setCampaignFilter] = useState('all');
  const [selected, setSelected] = useState(null);
  const b = BRANDS[brand];
  const campaigns = useMemo(() => [...new Set(data.adInsights.map(r => r.campaign_name))].sort(), [data]);

  const creativeMap = useMemo(() => {
    const map = {};
    (data.adsCreatives || []).forEach(ad => {
      if (ad.creative) map[ad.id] = ad.creative;
    });
    return map;
  }, [data]);

  const cards = useMemo(() => {
    const filtered = campaignFilter === 'all' ? data.adInsights : data.adInsights.filter(r => r.campaign_name === campaignFilter);
    return filtered
      .map(r => {
        const creative = creativeMap[r.ad_id];
        const thumb = creative?.image_url || creative?.thumbnail_url;
        if (!thumb) return null;
        const conversions = getActionValue(r.actions, 'purchase') + getActionValue(r.actions, 'omni_purchase');
        const revenue = getActionValue(r.action_values, 'purchase') + getActionValue(r.action_values, 'omni_purchase');
        const outbound = getActionValue(r.outbound_clicks, 'outbound_click');
        return {
          name: r.ad_name,
          campaign: r.campaign_name,
          adset: r.adset_name,
          thumbnail: thumb,
          title: creative?.title || '',
          body: creative?.body || '',
          spend: parseFloat(r.spend || 0),
          impressions: parseInt(r.impressions || 0),
          reach: parseInt(r.reach || 0),
          clicks: parseInt(r.clicks || 0),
          ctr: parseFloat(r.ctr || 0),
          cpc: parseFloat(r.cpc || 0),
          cpm: parseFloat(r.cpm || 0),
          frequency: parseFloat(r.frequency || 0),
          outboundClicks: outbound,
          conversions,
          costPerConv: conversions > 0 ? parseFloat(r.spend)/conversions : 0,
          revenue,
          roas: parseFloat(r.spend) > 0 ? revenue / parseFloat(r.spend) : 0,
        };
      })
      .filter(Boolean)
      .sort((a, b) => (b[sortMetric] || 0) - (a[sortMetric] || 0));
  }, [data, creativeMap, sortMetric, campaignFilter]);

  const avgMetric = useMemo(() => {
    if (!cards.length) return 0;
    return cards.reduce((s, c) => s + (c[sortMetric] || 0), 0) / cards.length;
  }, [cards, sortMetric]);

  const metricOptions = [
    { value: 'roas', label: 'ROAS' },
    { value: 'revenue', label: 'Revenue' },
    { value: 'conversions', label: 'Conversions' },
    { value: 'costPerConv', label: 'CPA (low is better)' },
    { value: 'spend', label: 'Spend' },
    { value: 'ctr', label: 'CTR' },
    { value: 'cpc', label: 'CPC (low is better)' },
    { value: 'cpm', label: 'CPM (low is better)' },
    { value: 'outboundClicks', label: 'Outbound Clicks' },
    { value: 'impressions', label: 'Impressions' },
    { value: 'reach', label: 'Reach' },
    { value: 'clicks', label: 'Clicks' },
    { value: 'frequency', label: 'Frequency' },
  ];

  const isLowerBetter = sortMetric === 'cpc' || sortMetric === 'costPerConv' || sortMetric === 'cpm';

  const fmtMetricVal = (card) => {
    const v = card[sortMetric] || 0;
    if (sortMetric === 'roas') return v > 0 ? fmt.roas(v) : '-';
    if (sortMetric === 'ctr') return fmt.pct(v);
    if (sortMetric === 'cpc' || sortMetric === 'cpm' || sortMetric === 'costPerConv') return v > 0 ? fmt.currency(v) : '-';
    if (sortMetric === 'spend' || sortMetric === 'revenue') return fmt.currency(v);
    if (sortMetric === 'frequency') return fmt.decimal(v);
    return fmt.number(v);
  };

  return (
    <div className="space-y-4 fade-in">
      <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2">
        <div className="flex items-center gap-4 flex-wrap">
          <div className="flex items-center gap-2">
            <label className="text-xs font-semibold text-gray-400 uppercase tracking-wider">Campaign</label>
            <select
              value={campaignFilter}
              onChange={e => setCampaignFilter(e.target.value)}
              className="px-3 py-1.5 text-sm border rounded-lg bg-white focus:outline-none"
              style={{borderColor: '#f0f0f2'}}
            >
              <option value="all">All Campaigns</option>
              {campaigns.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div className="flex items-center gap-2">
            <label className="text-xs font-semibold text-gray-400 uppercase tracking-wider">Rank by</label>
            <select
              value={sortMetric}
              onChange={e => setSortMetric(e.target.value)}
              className="px-3 py-1.5 text-sm border rounded-lg bg-white focus:outline-none"
              style={{borderColor: '#f0f0f2'}}
            >
              {metricOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
            </select>
          </div>
        </div>
        <span className="text-xs text-gray-400">{cards.length} creatives with thumbnails</span>
      </div>

      {cards.length === 0 ? (
        <div className="text-center py-12 text-gray-400">
          No ad creatives with thumbnails found. Creative thumbnails require active or recently paused ads.
        </div>
      ) : (
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-2 sm:gap-3 stagger">
          {cards.map((card, i) => {
            const val = card[sortMetric] || 0;
            const isGood = isLowerBetter ? val < avgMetric : val > avgMetric;
            const perfColor = i < 3 ? b.primary : (isGood ? '#059669' : '#dc2626');
            const borderStyle = i < 3 ? `2px solid ${b.primary}` : `1px solid ${isGood ? '#d1fae5' : '#fee2e2'}`;
            const cardStats = [
              { label: 'Spend', value: fmt.currency(card.spend) },
              { label: 'Conv.', value: card.conversions > 0 ? fmt.number(card.conversions) : '-' },
              { label: 'ROAS', value: card.roas > 0 ? fmt.roas(card.roas) : '-' },
              { label: 'CTR', value: fmt.pct(card.ctr) },
              { label: 'CPC', value: fmt.currency(card.cpc) },
              { label: 'Revenue', value: card.revenue > 0 ? fmt.currency(card.revenue) : '-' },
            ];
            return (
              <div key={i} className="creative-card bg-white rounded-xl overflow-hidden hover:shadow-lg transition-all cursor-pointer group" style={{border: borderStyle}} onClick={() => setSelected(i)}>
                <div className="relative bg-gray-950 flex items-center justify-center">
                  <img src={card.thumbnail} alt={card.name} className="w-full object-contain" style={{maxHeight: '220px', minHeight: '120px'}} loading="lazy" />
                  <div className="absolute top-1.5 left-1.5">
                    <span className="inline-flex items-center justify-center w-6 h-6 rounded-full text-white text-[10px] font-bold shadow-md" style={{backgroundColor: perfColor + 'dd'}}>
                      {i + 1}
                    </span>
                  </div>
                </div>
                <div className="p-2.5">
                  <h4 className="text-xs font-semibold text-gray-900 truncate leading-tight">{card.name}</h4>
                  <p className="text-[10px] text-gray-400 truncate mt-0.5 mb-2">{card.campaign}</p>
                  <div className="flex items-center justify-between py-1.5 px-2 rounded-md mb-2" style={{backgroundColor: i < 3 ? b.primaryLight : (isGood ? '#f0fdf4' : '#fef2f2')}}>
                    <span className="text-[9px] text-gray-500 uppercase font-medium tracking-wide">{metricOptions.find(o => o.value === sortMetric)?.label?.replace(' (low is better)', '') || sortMetric}</span>
                    <span className="text-xs font-bold tabular-nums" style={{color: perfColor}}>{fmtMetricVal(card)}</span>
                  </div>
                  <div className="grid grid-cols-3 gap-x-1.5 gap-y-1">
                    {cardStats.map(s => (
                      <div key={s.label} className="text-center">
                        <div className="text-[8px] text-gray-400 uppercase tracking-wide leading-tight">{s.label}</div>
                        <div className="text-[10px] font-semibold text-gray-700 tabular-nums leading-tight">{s.value}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {selected !== null && cards[selected] && (
        <CreativeModal card={cards[selected]} rank={selected + 1} brand={brand} onClose={() => setSelected(null)} />
      )}
    </div>
  );
}

// ─── Main App ───
function App() {
  const [token, setToken] = useState(localStorage.getItem('meta_ads_token') || DEFAULT_TOKEN);
  const [brand, setBrand] = useState(localStorage.getItem('meta_ads_brand') || 'gaf');
  const [tab, setTab] = useState('overview');
  const [datePreset, setDatePreset] = useState('last_30d');
  const [customDates, setCustomDates] = useState({ since: '', until: '' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [data, setData] = useState(null);
  const [lastRefresh, setLastRefresh] = useState(null);

  const b = BRANDS[brand];

  const handleBrandSwitch = (newBrand) => {
    setBrand(newBrand);
    localStorage.setItem('meta_ads_brand', newBrand);
    setData(null);
  };

  const handleLogout = () => {
    localStorage.removeItem('meta_ads_token');
    setToken('');
    setData(null);
  };

  const fetchData = useCallback(async () => {
    if (!token) return;
    setLoading(true);
    setError(null);
    try {
      const { since, until } = getDateRange(datePreset, customDates);
      if (!since || !until) { setError('Please select valid dates'); setLoading(false); return; }
      const accountId = BRANDS[brand].accountId;
      const comp = getComparisonRange(since, until);

      const [campaignInsights, adsetInsights, adInsights, dailyInsights, compInsights, campaignMeta] = await Promise.all([
        fetchInsights(accountId, 'campaign', since, until, token),
        fetchInsights(accountId, 'adset', since, until, token),
        fetchInsights(accountId, 'ad', since, until, token),
        fetchDailyInsights(accountId, since, until, token),
        fetchInsights(accountId, 'campaign', comp.since, comp.until, token).catch(() => []),
        fetchCampaignMeta(accountId, token).catch(() => []),
      ]);

      const adIds = [...new Set(adInsights.map(r => r.ad_id).filter(Boolean))];
      const adsCreatives = await fetchAdsCreatives(adIds, token);

      setData({ campaignInsights, adsetInsights, adInsights, adsCreatives, dailyInsights, compInsights, campaignMeta });
      setLastRefresh(new Date());
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  }, [token, brand, datePreset, customDates]);

  useEffect(() => {
    if (token) fetchData();
  }, [brand]);

  useEffect(() => {
    if (token && !data && !loading) fetchData();
  }, [token]);

  if (!token) return <TokenScreen onSave={setToken} brand={brand} />;

  const tabs = [
    { id: 'overview', label: 'Overview' },
    { id: 'campaigns', label: 'Campaigns' },
    { id: 'adsets', label: 'Ad Sets' },
    { id: 'creative', label: 'Creative Performance' },
  ];

  const dateOptions = [
    { value: 'today', label: 'Today' },
    { value: 'yesterday', label: 'Yesterday' },
    { value: 'last_7d', label: 'Last 7 Days' },
    { value: 'last_14d', label: 'Last 14 Days' },
    { value: 'last_30d', label: 'Last 30 Days' },
    { value: 'this_month', label: 'This Month' },
    { value: 'last_month', label: 'Last Month' },
    { value: 'custom', label: 'Custom Range' },
  ];

  return (
    <div className="min-h-screen" style={{background: '#f8f8fa'}}>
      {loading && <LoadingOverlay brand={brand} />}

      {/* Header */}
      <header className="sticky top-0 z-40 bg-white/80 backdrop-blur-md" style={{boxShadow: '0 1px 3px rgba(0,0,0,.08)'}}>
        <div className="max-w-[1600px] mx-auto px-3 sm:px-6">
          <div className="flex items-center justify-between h-14 sm:h-16">
            <div className="flex items-center gap-3 sm:gap-4">
              <img src={b.logoDark} alt={b.name} className="h-5 sm:h-7 w-auto object-contain" />
              <div className="h-5 w-px bg-gray-200 hidden sm:block" />
              <h1 className="font-display text-sm sm:text-base font-bold text-gray-900 hidden sm:block">Ad Performance</h1>
            </div>

            <div className="flex items-center gap-2 sm:gap-3">
              {/* Brand Toggle */}
              <div className="flex rounded-lg overflow-hidden border" style={{borderColor: '#e5e7eb'}}>
                {Object.entries(BRANDS).map(([key, val]) => (
                  <button
                    key={key}
                    onClick={() => handleBrandSwitch(key)}
                    className="px-2.5 sm:px-3.5 py-1 sm:py-1.5 text-xs font-semibold uppercase tracking-wider transition-all"
                    style={{
                      backgroundColor: brand === key ? b.primary : 'transparent',
                      color: brand === key ? '#fff' : '#6b7280',
                    }}
                  >
                    {key === 'gaf' ? 'GAF' : 'Revel'}
                  </button>
                ))}
              </div>

              <button
                onClick={handleLogout}
                className="p-1.5 sm:p-2 rounded-lg transition-colors hover:bg-gray-100 text-gray-400 hover:text-gray-600"
                title="Change token"
              >
                {Icons.logout}
              </button>
            </div>
          </div>
        </div>
      </header>

      {/* Controls Bar */}
      <div className="max-w-[1600px] mx-auto px-3 sm:px-6 mt-4 sm:mt-5">
        <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
          {/* Tabs */}
          <nav className="flex items-center gap-1 overflow-x-auto scrollbar-thin bg-white rounded-xl p-1" style={{boxShadow: '0 1px 2px rgba(0,0,0,.04)', border: '1px solid rgba(0,0,0,.04)'}}>
            {tabs.map(t => (
              <button
                key={t.id}
                onClick={() => setTab(t.id)}
                className="px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm font-semibold rounded-lg whitespace-nowrap transition-all"
                style={{
                  backgroundColor: tab === t.id ? b.primary : 'transparent',
                  color: tab === t.id ? '#ffffff' : '#6b7280',
                }}
              >
                {t.label}
              </button>
            ))}
          </nav>

          {/* Date + Refresh */}
          <div className="flex items-center gap-2 flex-shrink-0">
            <select
              value={datePreset}
              onChange={e => setDatePreset(e.target.value)}
              className="px-2 sm:px-3 py-1.5 sm:py-2 text-xs sm:text-sm border rounded-lg bg-white focus:outline-none flex-1 sm:flex-none"
              style={{borderColor: '#e5e7eb'}}
            >
              {dateOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
            </select>

            {datePreset === 'custom' && (
              <div className="flex items-center gap-1">
                <input
                  type="date"
                  value={customDates.since}
                  onChange={e => setCustomDates(p => ({...p, since: e.target.value}))}
                  className="px-1.5 sm:px-2 py-1.5 text-xs sm:text-sm border rounded-lg w-28 sm:w-auto"
                  style={{borderColor: '#e5e7eb'}}
                />
                <span className="text-gray-400 text-xs">to</span>
                <input
                  type="date"
                  value={customDates.until}
                  onChange={e => setCustomDates(p => ({...p, until: e.target.value}))}
                  className="px-1.5 sm:px-2 py-1.5 text-xs sm:text-sm border rounded-lg w-28 sm:w-auto"
                  style={{borderColor: '#e5e7eb'}}
                />
              </div>
            )}

            <button
              onClick={fetchData}
              disabled={loading}
              className="inline-flex items-center gap-1.5 px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm font-semibold text-white rounded-lg transition-all hover:opacity-90 disabled:opacity-50"
              style={{backgroundColor: b.primary}}
            >
              {Icons.refresh}
              Refresh
            </button>
          </div>
        </div>
      </div>

      {/* Error Banner */}
      {error && (
        <div className="max-w-[1600px] mx-auto px-4 sm:px-6 mt-4">
          <div className="dash-card bg-red-50 px-4 py-3 flex items-center justify-between">
            <span className="text-sm text-red-700">{error}</span>
            <button onClick={() => setError(null)} className="text-red-400 hover:text-red-600 text-sm">Dismiss</button>
          </div>
        </div>
      )}

      {/* Last Refreshed */}
      {lastRefresh && (
        <div className="max-w-[1600px] mx-auto px-3 sm:px-6 mt-2 sm:mt-3">
          <p className="text-[10px] sm:text-xs text-gray-400">
            Last refreshed: {lastRefresh.toLocaleTimeString()} ({getDateRange(datePreset, customDates).since} to {getDateRange(datePreset, customDates).until})
          </p>
        </div>
      )}

      {/* Content */}
      <main className="max-w-[1600px] mx-auto px-3 sm:px-6 py-4 sm:py-6">
        {!data && !loading && !error && (
          <div className="text-center py-20 text-gray-400">
            <p className="text-sm">Click Refresh to pull data</p>
          </div>
        )}
        {tab === 'overview' && data && <OverviewTab data={data} brand={brand} />}
        {tab === 'campaigns' && data && <CampaignsTab data={data} brand={brand} />}
        {tab === 'adsets' && data && <AdSetsTab data={data} brand={brand} />}
        {tab === 'creative' && data && <CreativeTab data={data} brand={brand} />}
      </main>

      {/* Footer */}
      <footer className="py-3 sm:py-4 mt-6 sm:mt-8">
        <div className="max-w-[1600px] mx-auto px-3 sm:px-6 flex flex-col sm:flex-row items-center justify-between gap-1">
          <span className="text-[10px] sm:text-xs text-gray-300">Data pulled live from Meta Marketing API v21.0</span>
          <span className="text-[10px] sm:text-xs text-gray-300">Token stored locally in browser only</span>
        </div>
      </footer>
    </div>
  );
}

// ─── Mount ───
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
