// ===== DONUT CHART =====
const Donut = ({ data, size = 220, thickness = 28 }) => {
  const th = useTheme();
  const r = (size - thickness) / 2;
  const c = 2 * Math.PI * r;
  const total = data.reduce((s, d) => s + d.value, 0);
  let cum = 0;
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={th.donutTrack} strokeWidth={thickness} />
      {data.map((d, i) => {
        const pct = d.value / total;
        const offset = c * (1 - pct);
        const rotation = cum * 360;
        cum += pct;
        return <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={d.color} strokeWidth={thickness}
          strokeDasharray={c} style={{'--circumference': c, '--dash-offset': offset}}
          className="donut-animate" strokeDashoffset={c}
          transform={`rotate(${rotation} ${size/2} ${size/2})`} />;
      })}
    </svg>
  );
};

// ===== APP =====
const SLIDES = [TitleSlide, PerfSlide, SalesSlide, DigitalSlide, WinsSlide, ChallengesSlide, PlansSlide, ExpSlide, SupportSlide, QSlide];

function App() {
  const [idx, setIdx] = useState(0);
  const [key, setKey] = useState(0);
  const [dark, setDark] = useState(false);
  const [scale, setScale] = useState(1);
  const th = dark ? themes.dark : themes.light;

  const go = useCallback((dir) => {
    const next = idx + dir;
    if (next >= 0 && next < SLIDES.length) { setIdx(next); setKey(k => k + 1); }
  }, [idx]);

  useEffect(() => {
    const calcScale = () => {
      const sw = window.innerWidth / 1600;
      const sh = window.innerHeight / 900;
      setScale(Math.min(sw, sh, 1));
    };
    calcScale();
    window.addEventListener('resize', calcScale);
    return () => window.removeEventListener('resize', calcScale);
  }, []);

  useEffect(() => {
    const h = e => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
      else if (e.key === 'ArrowLeft') go(-1);
      else if (e.key === 'd' || e.key === 'D') setDark(d => !d);
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [go]);

  useEffect(() => {
    document.body.style.background = th.bodyBg;
    document.body.className = th.grainClass;
  }, [dark]);

  const C = SLIDES[idx];
  return (
    <ThemeCtx.Provider value={th}>
      <div className="w-screen h-screen overflow-hidden relative" style={{background: th.bodyBg}}>
        <div key={key} className="absolute overflow-hidden slide-enter rounded-lg" style={{width: 1600, height: 900, transform: `scale(${scale})`, transformOrigin: 'center center', left: '50%', top: '50%', marginLeft: -800, marginTop: -450, boxShadow: dark ? '0 0 80px rgba(0,0,0,.6)' : '0 4px 60px rgba(0,0,0,.12)'}}>
          <C n={idx + 1} t={SLIDES.length} />
          {/* Nav + theme toggle */}
          <div className="absolute bottom-6 right-8 flex gap-2 z-50">
            <button onClick={() => setDark(d => !d)} title="Toggle theme (D)"
              className={`w-9 h-9 rounded-full flex items-center justify-center transition-all border ${th.navBg} ${th.navBorder} ${th.navText} ${th.navHover}`}>
              {dark ? <Sun size={14} /> : <Moon size={14} />}
            </button>
            <div className="w-px h-9 bg-gaf-orange/20"></div>
            <button onClick={() => go(-1)} disabled={idx===0}
              className={`w-9 h-9 rounded-full flex items-center justify-center transition-all border ${idx===0 ? th.navDisabled : `${th.navBg} ${th.navBorder} ${th.navText} ${th.navHover}`}`}>
              <ChevL size={16} />
            </button>
            <button onClick={() => go(1)} disabled={idx===SLIDES.length-1}
              className={`w-9 h-9 rounded-full flex items-center justify-center transition-all border ${idx===SLIDES.length-1 ? th.navDisabled : `${th.navBg} ${th.navBorder} ${th.navText} ${th.navHover}`}`}>
              <ChevR size={16} />
            </button>
          </div>
        </div>
      </div>
    </ThemeCtx.Provider>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<App />);
