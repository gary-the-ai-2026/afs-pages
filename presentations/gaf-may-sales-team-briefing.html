<script>

  theme: {
    extend: {
      colors: {

      fontFamily: {
        display: ['"Bebas Neue"', 'sans-serif'],

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;overflow:hidden}
h1,h2,h3,h4,h5,h6{font-family:'Outfit',sans-serif}

.grain-dark::after{content:'';position:fixed;inset:0;pointer-events:none;opacity:.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  z-index:9999}

.slide-enter{animation:slideIn .5s cubic-bezier(.16,1,.3,1) forwards}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.stagger>*{opacity:0;animation:slideIn .5s cubic-bezier(.16,1,.3,1) forwards}
.stagger>*:nth-child(1){animation-delay:.05s}
.stagger>*:nth-child(2){animation-delay:.12s}
.stagger>*:nth-child(3){animation-delay:.19s}
.stagger>*:nth-child(4){animation-delay:.26s}
.stagger>*:nth-child(5){animation-delay:.33s}
.stagger>*:nth-child(6){animation-delay:.4s}
.stagger>*:nth-child(7){animation-delay:.47s}
.stagger>*:nth-child(8){animation-delay:.54s}

.bar-grow{animation:barGrow .8s cubic-bezier(.16,1,.3,1) forwards}
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}

.fill-anim{animation:fillWidth 1s cubic-bezier(.16,1,.3,1) forwards}
@keyframes fillWidth{from{width:0}to{width:var(--target-w)}}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#f26422;border-radius:10px}

.slash{position:absolute;width:200%;height:1px;transform:rotate(-12deg)}
</style>

const Target = p => <svg xmlns="http://www.w3.org/2000/svg" width={p.size||18} height={p.size||18} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className||''}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
const Trophy = p => <I {...p} d={["M6 9H4.5a2.5 2.5 0 010-5H6","M18 9h1.5a2.5 2.5 0 000-5H18","M4 22h16","M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22","M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22","M18 2H6v7a6 6 0 0012 0V2z"]} />;
const Cal = p => <I {...p} d={["M19 4H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2z","M16 2v4","M8 2v4","M3 10h18"]} />;
const Card = p => <I {...p} d={["M21 4H3a2 2 0 00-2 2v12a2 2 0 002 2h18a2 2 0 002-2V6a2 2 0 00-2-2z","M1 10h22"]} />;
const Megaphone = p => <I {...p} d={["M3 11l18-5v12L3 13v-2z","M11.6 16.8a3 3 0 11-5.8-1.6"]} />;
const Tv = p => <I {...p} d={["M2 7h20v13H2z","M7 4l5 3 5-3"]} />;
const Pkg = p => <I {...p} d={["M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z","M3.27 6.96L12 12.01l8.73-5.05","M12 22.08V12"]} />;

const Logo = () => {

      <Logo />
      <div className="flex items-center gap-3">
        <span className={`text-[14px] font-heading font-light tracking-[.3em] ${th.sub} uppercase`}>Sales Team Briefing</span>
        <div className={`w-px h-4 ${th.bg3}`}></div>
        <span className={`text-[14px] font-body ${th.sub}`}>{num}<span className={`${th.muted} mx-1`}>/</span>{total}</span>
      </div>
    </header>
    <main className={`flex-1 flex flex-col z-10 overflow-hidden ${noPad ? '' : 'px-10 pb-8'}`}>

    <footer className="h-1 bg-gradient-to-r from-gaf-orange via-gaf-orange to-transparent z-10 shrink-0" style={{width: `${(num/total)*100}%`}}></footer>
  </div>

};

// ===== KPI CARD =====
const Kpi = ({ label, value, sub, accent }) => {

  <div className={`p-4 rounded-lg border ${accent ? `${th.kpiAccentBg} ${th.borderAccent}` : `${th.cardBg} ${th.cardBorder}`}`}>

    {sub && <p className={`text-[15px] ${th.sub} mt-1.5 font-body`}>{sub}</p>}
  </div>
  );
};

// ===== SECTION TITLE =====
const SectionTitle = ({ pre, title, sub }) => {
  const th = useTheme();
  return (
  <div className="mb-4 shrink-0 stagger">
    {pre && <p className="text-[14px] font-heading tracking-[.4em] text-gaf-orange uppercase mb-2">{pre}</p>}
    <h1 className={`font-display text-5xl md:text-7xl ${th.text} leading-[0.9] tracking-wide`}>{title}</h1>
    {sub && <p className={`text-[15px] ${th.sub} mt-3 font-body max-w-2xl leading-snug`}>{sub}</p>}

};

const TitleSlide = ({ n, t }) => {

                  height: `${(d.rev / max) * 78}%`, minHeight: '3px',

      </div>
    </div>
  </Slide>
  );
};

// ===== APP =====
const SLIDES = [TitleSlide, TargetsSlide, LatitudeSlide, QRLSlide, BumperSlide, NikeSlide, EOFYSlide, QSlide];

function App() {
  const [idx, setIdx] = useState(0);
  const [key, setKey] = useState(0);
  const [dark, setDark] = useState(false);
  const [zoom, setZoom] = useState(() => Math.min(window.innerWidth / 1600, window.innerHeight / 900, 1));
  const th = dark ? themes.dark : themes.light;

  const go = useCallback((dir) => {
    const next = idx + dir;
    if (next >= 0 && next < SLIDES.length) { setIdx(next); setKey(k => k + 1); }
  }, [idx]);

  useEffect(() => {
    const calc = () => setZoom(Math.min(window.innerWidth / 1600, window.innerHeight / 900, 1));
    window.addEventListener('resize', calc);
    return () => window.removeEventListener('resize', calc);
  }, []);

  useEffect(() => {
    const h = e => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
      else if (e.key === 'ArrowLeft') go(-1);
      else if (e.key === 'd' || e.key === 'D') setDark(d => !d);
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [go]);

  useEffect(() => {
    document.body.style.background = th.bodyBg;
    document.body.className = th.grainClass;
  }, [dark]);

  const C = SLIDES[idx];
  return (
    <ThemeCtx.Provider value={th}>
      <div className="w-screen h-screen overflow-hidden flex items-center justify-center" style={{background: th.bodyBg}}>
        <div key={key} className="overflow-hidden slide-enter rounded-lg shrink-0" style={{width: 1600, height: 900, zoom, boxShadow: dark ? '0 0 80px rgba(0,0,0,.6)' : '0 4px 60px rgba(0,0,0,.12)'}}>
          <C n={idx + 1} t={SLIDES.length} />
          <div className="absolute bottom-6 right-8 flex gap-2 z-50">
            <button onClick={() => setDark(d => !d)} title="Toggle theme (D)"
              className={`w-9 h-9 rounded-full flex items-center justify-center transition-all border ${th.navBg} ${th.navBorder} ${th.navText} ${th.navHover}`}>
              {dark ? <Sun size={14} /> : <Moon size={14} />}
            </button>
            <div className="w-px h-9 bg-gaf-orange/20"></div>
            <button onClick={() => go(-1)} disabled={idx===0}
              className={`w-9 h-9 rounded-full flex items-center justify-center transition-all border ${idx===0 ? th.navDisabled : `${th.navBg} ${th.navBorder} ${th.navText} ${th.navHover}`}`}>
              <ChevL size={16} />
            </button>
            <button onClick={() => go(1)} disabled={idx===SLIDES.length-1}
              className={`w-9 h-9 rounded-full flex items-center justify-center transition-all border ${idx===SLIDES.length-1 ? th.navDisabled : `${th.navBg} ${th.navBorder} ${th.navText} ${th.navHover}`}`}>
              <ChevR size={16} />
            </button>
          </div>
        </div>
      </div>
    </ThemeCtx.Provider>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<App />);
