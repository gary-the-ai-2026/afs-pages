// ===== APP =====
const SLIDES = [TitleSlide, LatitudeSlide, QRLSlide, NikeSlide, EOFYSlide, SummarySlide];

function App() {
  const [currentSlide, setCurrentSlide] = useState(0);
  const nextSlide = () => { if (currentSlide < SLIDES.length - 1) setCurrentSlide(c => c + 1); };
  const prevSlide = () => { if (currentSlide > 0) setCurrentSlide(c => c - 1); };

  useEffect(() => {
    const handleKeyDown = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
      else if (e.key === 'ArrowLeft') prevSlide();
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [currentSlide]);

  const CurrentSlideComponent = SLIDES[currentSlide];

  return (
    <div className="relative w-full min-h-screen bg-gray-900 flex items-center justify-center p-0 sm:p-4 lg:p-6 overflow-x-hidden">
      <div className="w-full max-w-[1600px] h-full min-h-[650px] md:max-h-[92vh] md:aspect-video bg-white shadow-2xl relative overflow-hidden flex flex-col rounded-none sm:rounded-xl">
        <div className="flex-1 overflow-y-auto custom-scrollbar">
          <CurrentSlideComponent slideNumber={currentSlide + 1} totalSlides={SLIDES.length} />
        </div>
        <div className="absolute bottom-16 right-12 flex gap-4 z-50">
          <button onClick={prevSlide} disabled={currentSlide === 0} className={`p-3 rounded-full transition-all border-2 border-transparent ${currentSlide === 0 ? 'bg-gray-100 text-gray-300 cursor-not-allowed opacity-50' : 'bg-gaf-black text-white hover:bg-gaf-orange hover:shadow-lg active:scale-95'}`}>
            <ChevronLeft size={24} />
          </button>
          <button onClick={nextSlide} disabled={currentSlide === SLIDES.length - 1} className={`p-3 rounded-full transition-all border-2 border-transparent ${currentSlide === SLIDES.length - 1 ? 'bg-gray-100 text-gray-300 cursor-not-allowed opacity-50' : 'bg-gaf-black text-white hover:bg-gaf-orange hover:shadow-lg active:scale-95'}`}>
            <ChevronRight size={24} />
          </button>
        </div>
      </div>
    </div>
  );
}

// ===== MOUNT =====
const root = createRoot(document.getElementById('root'));
