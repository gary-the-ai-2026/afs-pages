// ===== PIE CHART COMPONENT =====
const PieChart = ({ data, size = 200 }) => {
  const total = data.reduce((s, d) => s + d.value, 0);
  const cx = size / 2, cy = size / 2, r = size / 2 - 8;
  let cumAngle = -Math.PI / 2;

  const slices = data.map((d, i) => {
    const angle = (d.value / total) * 2 * Math.PI;
    const startX = cx + r * Math.cos(cumAngle);
    const startY = cy + r * Math.sin(cumAngle);
    const endX = cx + r * Math.cos(cumAngle + angle);
    const endY = cy + r * Math.sin(cumAngle + angle);
    const largeArc = angle > Math.PI ? 1 : 0;
    const midAngle = cumAngle + angle / 2;
    const labelR = r * 0.65;
    const labelX = cx + labelR * Math.cos(midAngle);
    const labelY = cy + labelR * Math.sin(midAngle);
    const pct = ((d.value / total) * 100).toFixed(1);
    cumAngle += angle;
    return { ...d, startX, startY, endX, endY, largeArc, labelX, labelY, pct, angle };
  });

  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>
      {slices.map((s, i) => (
        <g key={i}>
          <path d={`M${cx},${cy} L${s.startX},${s.startY} A${r},${r} 0 ${s.largeArc},1 ${s.endX},${s.endY} Z`}
            fill={s.color} stroke="white" strokeWidth="2" />
          {s.angle > 0.3 && (
            <text x={s.labelX} y={s.labelY} textAnchor="middle" dominantBaseline="central"
              fill="white" fontSize="11" fontWeight="800" fontFamily="Montserrat, sans-serif">{s.pct}%</text>
          )}
        </g>
      ))}
    </svg>
  );
};

        let cumAngle = 0;
        const slices = channels.map(c => {
          const pct = c.sessions / total;

// ===== APP =====
const SLIDES = [TitleSlide, PerformanceSlide, CategorySlide, GA4Slide, WinsSlide, ChallengesSlide, PlansSlide, ExperienceCentreSlide, SupportSlide, QuestionsSlide];

function App() {
  const [currentSlide, setCurrentSlide] = useState(0);
  const nextSlide = () => { if (currentSlide < SLIDES.length - 1) setCurrentSlide(c => c + 1); };
  const prevSlide = () => { if (currentSlide > 0) setCurrentSlide(c => c - 1); };

  useEffect(() => {
    const handleKeyDown = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
      else if (e.key === 'ArrowLeft') prevSlide();
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [currentSlide]);

  const CurrentSlideComponent = SLIDES[currentSlide];

  return (
    <div className="relative w-full min-h-screen bg-gray-900 flex items-center justify-center p-0 sm:p-4 lg:p-6 overflow-x-hidden">
      <div className="w-full max-w-[1600px] h-full min-h-[650px] md:max-h-[92vh] md:aspect-video bg-white shadow-2xl relative overflow-hidden flex flex-col rounded-none sm:rounded-xl">
        <div className="flex-1 overflow-y-auto custom-scrollbar">
          <CurrentSlideComponent slideNumber={currentSlide + 1} totalSlides={SLIDES.length} />
        </div>
        <div className="absolute bottom-16 right-12 flex gap-4 z-50">
          <button onClick={prevSlide} disabled={currentSlide === 0} className={`p-3 rounded-full transition-all border-2 border-transparent ${currentSlide === 0 ? 'bg-gray-100 text-gray-300 cursor-not-allowed opacity-50' : 'bg-rep-dark text-white hover:bg-rep-red hover:shadow-lg active:scale-95'}`}>
            <ChevronLeft size={24} />
          </button>
          <button onClick={nextSlide} disabled={currentSlide === SLIDES.length - 1} className={`p-3 rounded-full transition-all border-2 border-transparent ${currentSlide === SLIDES.length - 1 ? 'bg-gray-100 text-gray-300 cursor-not-allowed opacity-50' : 'bg-rep-dark text-white hover:bg-rep-red hover:shadow-lg active:scale-95'}`}>
            <ChevronRight size={24} />
          </button>
        </div>
      </div>
    </div>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<App />);
