// ===== MAIN APP =====
function App() {
  const [slide, setSlide] = useState(0);
  const [key, setKey] = useState(0);
  const total = SLIDES.length;

  const navigate = useCallback((delta) => {
    setSlide(prev => {
      const next = typeof delta === 'number' ? prev + delta : delta;
      if (next < 0 || next >= total) return prev;
      return next;
    });
    setKey(k => k + 1);
  }, [total]);

  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); navigate(1); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); navigate(-1); }
      if (e.key === 'Home') { e.preventDefault(); setSlide(0); setKey(k => k + 1); }
      if (e.key === 'End') { e.preventDefault(); setSlide(total - 1); setKey(k => k + 1); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [navigate, total]);

  const slideComponents = [
    <CoverSlide />,
    <AboutSlide />,
    <OpportunitySlide />,
    <InsightSlide />,
    <ProductsSlide />,
    <StructureSlide />,
    <HarrisBenefitsSlide />,
    <NextStepsSlide />,
  ];

  return (
    <div className="w-screen h-screen overflow-hidden bg-revel-black">
      <div key={key}>
        {slideComponents[slide]}
      </div>
      <SlideNav current={slide} total={total} onNav={navigate} />
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App />);
