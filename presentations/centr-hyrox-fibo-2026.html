          <h4 className="font-bold text-gaf-darkGrey uppercase tracking-wide text-[10px]">Top Pages by Views</h4>
        </div>
        <div className="grid grid-cols-5 gap-3">

            { page: "Sandbag", views: "15,000" },
            { page: "Kettlebell Competition", views: "15,000" },

              <p className="text-[8px] text-gray-400">views</p>
            </div>
          ))}
        </div>
      </div>

      {/* Traffic Source Pie Chart */}
      {(() => {
        const channels = [
          { name: "Paid Social", sessions: 44126, color: "#3b82f6" },
          { name: "Paid Shopping", sessions: 29552, color: "#f59e0b" },
          { name: "Cross-network", sessions: 16318, color: "#f97316" },
          { name: "Referral", sessions: 15301, color: "#8b5cf6" },
          { name: "Direct", sessions: 14642, color: "#6b7280" },
          { name: "Paid Search", sessions: 13565, color: "#10b981" },
          { name: "Organic Search", sessions: 9893, color: "#06b6d4" },
          { name: "Other", sessions: 12588, color: "#d1d5db" },
        ];
        const total = channels.reduce((s, c) => s + c.sessions, 0);
        let cumAngle = 0;
        const slices = channels.map(c => {
          const pct = c.sessions / total;
          const startAngle = cumAngle;
          cumAngle += pct * 360;
          const endAngle = cumAngle;
          const startRad = (startAngle - 90) * Math.PI / 180;
          const endRad = (endAngle - 90) * Math.PI / 180;
          const largeArc = pct > 0.5 ? 1 : 0;
          const x1 = 50 + 40 * Math.cos(startRad);
          const y1 = 50 + 40 * Math.sin(startRad);
          const x2 = 50 + 40 * Math.cos(endRad);
          const y2 = 50 + 40 * Math.sin(endRad);
          return { ...c, pct, path: `M50,50 L${x1},${y1} A40,40 0 ${largeArc},1 ${x2},${y2} Z` };
        });
        return (
          <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-4 shrink-0">

              <div className="grid grid-cols-3 gap-x-6 gap-y-1.5 flex-1">

                    <span className="text-[10px] text-gray-700"><strong>{(s.pct * 100).toFixed(0)}%</strong> {s.name}</span>

            <p className="text-[10px] text-gray-500 mt-3 leading-relaxed"><strong>Key insight:</strong> Paid Social (28%) is the dominant channel — strong alignment with the Hyrox community-driven brand. Organic search at 6% highlights the need for continued brand-building investment to grow earned traffic.</p>
          </div>

// ===== APP =====
const SLIDES = [TitleSlide, PerformanceSlide, CategorySlide, GA4Slide, WinsSlide, ChallengesSlide, PlansSlide, ExperienceCentreSlide, SupportSlide, QuestionsSlide];

function App() {
  const [currentSlide, setCurrentSlide] = useState(0);
  const nextSlide = () => { if (currentSlide < SLIDES.length - 1) setCurrentSlide(c => c + 1); };
  const prevSlide = () => { if (currentSlide > 0) setCurrentSlide(c => c - 1); };

  useEffect(() => {
    const handleKeyDown = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
      else if (e.key === 'ArrowLeft') prevSlide();
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [currentSlide]);

  const CurrentSlideComponent = SLIDES[currentSlide];

  return (
    <div className="relative w-full min-h-screen bg-gray-900 flex items-center justify-center p-0 sm:p-4 lg:p-6 overflow-x-hidden">
      <div className="w-full max-w-[1600px] h-full min-h-[650px] md:max-h-[92vh] md:aspect-video bg-white shadow-2xl relative overflow-hidden flex flex-col rounded-none sm:rounded-xl">
        <div className="flex-1 overflow-y-auto custom-scrollbar">
          <CurrentSlideComponent slideNumber={currentSlide + 1} totalSlides={SLIDES.length} />
        </div>
        <div className="absolute bottom-16 right-12 flex gap-4 z-50">
          <button onClick={prevSlide} disabled={currentSlide === 0} className={`p-3 rounded-full transition-all border-2 border-transparent ${currentSlide === 0 ? 'bg-gray-100 text-gray-300 cursor-not-allowed opacity-50' : 'bg-gaf-darkGrey text-white hover:bg-gaf-orange hover:shadow-lg active:scale-95'}`}>
            <ChevronLeft size={24} />
          </button>
          <button onClick={nextSlide} disabled={currentSlide === SLIDES.length - 1} className={`p-3 rounded-full transition-all border-2 border-transparent ${currentSlide === SLIDES.length - 1 ? 'bg-gray-100 text-gray-300 cursor-not-allowed opacity-50' : 'bg-gaf-darkGrey text-white hover:bg-gaf-orange hover:shadow-lg active:scale-95'}`}>
            <ChevronRight size={24} />
          </button>
        </div>
      </div>
    </div>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<App />);
