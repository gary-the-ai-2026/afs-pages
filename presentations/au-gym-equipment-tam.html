<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AU Gym Equipment — Market Sizing</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        gaf: { orange: '#f26422', black: '#0a0a0a', dark: '#141414', mid: '#1e1e1e', steel: '#2a2a2a', ash: '#8a8a8a' },
        lt: { bg: '#ffffff', card: '#f7f7f8', card2: '#eeeef0', border: '#e0e0e2', text: '#1a1a1a', sub: '#6b6b6b', muted: '#b0b0b0' },
      },
      fontFamily: {
        display: ['"Bebas Neue"', 'sans-serif'],
        heading: ['"Outfit"', 'sans-serif'],
        body: ['"DM Sans"', 'sans-serif'],
      },
    }
  }
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;overflow:hidden}
h1,h2,h3,h4,h5,h6{font-family:'Outfit',sans-serif}

.grain-dark::after{content:'';position:fixed;inset:0;pointer-events:none;opacity:.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  z-index:9999}

.slide-enter{animation:slideIn .5s cubic-bezier(.16,1,.3,1) forwards}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.stagger>*{opacity:0;animation:slideIn .5s cubic-bezier(.16,1,.3,1) forwards}
.stagger>*:nth-child(1){animation-delay:.05s}
.stagger>*:nth-child(2){animation-delay:.12s}
.stagger>*:nth-child(3){animation-delay:.19s}
.stagger>*:nth-child(4){animation-delay:.26s}
.stagger>*:nth-child(5){animation-delay:.33s}
.stagger>*:nth-child(6){animation-delay:.4s}
.stagger>*:nth-child(7){animation-delay:.47s}
.stagger>*:nth-child(8){animation-delay:.54s}

.bar-grow{animation:barGrow .8s cubic-bezier(.16,1,.3,1) forwards;transform-origin:bottom}
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}

.fill-anim{animation:fillWidth 1s cubic-bezier(.16,1,.3,1) forwards}
@keyframes fillWidth{from{width:0}to{width:var(--target-w)}}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#f26422;border-radius:10px}

.slash{position:absolute;width:200%;height:1px;transform:rotate(-12deg)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://esm.sh/react@19.1.0" type="module"></script>
<script src="https://esm.sh/react-dom@19.1.0/client" type="module"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-type="module">
import React, { useState, useEffect, useCallback, createContext, useContext } from 'https://esm.sh/react@19.1.0';
import { createRoot } from 'https://esm.sh/react-dom@19.1.0/client';

// ===== THEME =====
const ThemeCtx = createContext();
const useTheme = () => useContext(ThemeCtx);

const themes = {
  light: {
    bg: 'bg-white', bg2: 'bg-lt-card', bg3: 'bg-lt-card2',
    border: 'border-lt-border', borderAccent: 'border-gaf-orange/20',
    text: 'text-lt-text', sub: 'text-lt-sub', muted: 'text-lt-muted',
    textInv: 'text-white',
    cardBg: 'bg-lt-card', cardBorder: 'border-lt-border',
    slashColor: 'rgba(242,100,34,0.06)', grainClass: '',
    bodyBg: '#f0f0f0', logoFilter: '', titleText: 'text-lt-text',
    kpiAccentBg: 'bg-gaf-orange/5', kpiDarkBg: 'bg-lt-text',
    navBg: 'bg-black/5', navBorder: 'border-black/10', navText: 'text-lt-text',
    navHover: 'hover:bg-gaf-orange hover:border-gaf-orange hover:text-white',
    navDisabled: 'bg-black/5 text-lt-muted cursor-not-allowed',
    green: 'text-emerald-600', greenBg: 'bg-emerald-500/10',
    footerText: 'text-lt-muted',
    tableBg: 'bg-lt-card/60', tableHeaderBg: 'bg-lt-card2', tableRowBorder: 'border-lt-border/50',
    tableHover: 'hover:bg-lt-card2/50',
    pillBg: 'bg-lt-card2', pillText: 'text-lt-sub',
    insightBg: 'bg-gaf-orange/5', insightBorder: 'border-gaf-orange/15',
    insightText: 'text-lt-sub',
    statCardBg: 'bg-lt-card', statCardBorder: 'border-lt-border',
  },
  dark: {
    bg: 'bg-gaf-black', bg2: 'bg-gaf-dark', bg3: 'bg-gaf-mid',
    border: 'border-gaf-steel/20', borderAccent: 'border-gaf-orange/20',
    text: 'text-white', sub: 'text-gaf-ash', muted: 'text-gaf-steel',
    textInv: 'text-gaf-black',
    cardBg: 'bg-gaf-dark', cardBorder: 'border-gaf-steel/20',
    slashColor: 'rgba(242,100,34,0.15)', grainClass: 'grain-dark',
    bodyBg: '#0a0a0a', logoFilter: 'brightness-0 invert', titleText: 'text-white',
    kpiAccentBg: 'bg-gaf-orange/5', kpiDarkBg: 'bg-gaf-dark',
    navBg: 'bg-white/5', navBorder: 'border-white/10', navText: 'text-white',
    navHover: 'hover:bg-gaf-orange hover:border-gaf-orange',
    navDisabled: 'bg-gaf-steel/20 text-gaf-steel cursor-not-allowed',
    green: 'text-emerald-400', greenBg: 'bg-emerald-500/10',
    footerText: 'text-gaf-steel',
    tableBg: 'bg-gaf-mid/60', tableHeaderBg: 'bg-gaf-steel/40', tableRowBorder: 'border-gaf-steel/20',
    tableHover: 'hover:bg-gaf-steel/10',
    pillBg: 'bg-gaf-steel/60', pillText: 'text-gaf-ash',
    insightBg: 'bg-gaf-orange/8', insightBorder: 'border-gaf-orange/15',
    insightText: 'text-gaf-ash',
    statCardBg: 'bg-gaf-steel/30', statCardBorder: 'border-gaf-steel/20',
  }
};

// ===== ICONS =====
const I = ({ d, size = 18, className = '', sw = 1.5 }) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" className={className}>
    {Array.isArray(d) ? d.map((p, i) => <path key={i} d={p} />) : <path d={d} />}
  </svg>
);
const ChevL = p => <I {...p} d="M15 18l-6-6 6-6" />;
const ChevR = p => <I {...p} d="M9 18l6-6-6-6" />;
const Bolt = p => <I {...p} d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />;
const Sun = p => <I {...p} d={["M12 1v2","M12 21v2","M4.22 4.22l1.42 1.42","M18.36 18.36l1.42 1.42","M1 12h2","M21 12h2","M4.22 19.78l1.42-1.42","M18.36 5.64l1.42-1.42"]} />;
const Moon = p => <I {...p} d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />;
const Shield = p => <I {...p} d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />;
const Pickaxe = p => <I {...p} d={["M14.5 2.5l5 5","M2 22l10-10","M22 2l-5.5 5.5","M15 9l-3 3"]} />;
const Home = p => <I {...p} d={["M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z","M9 22V12h6v10"]} />;

const GAF_LOGO = "https://cdn.shopify.com/s/files/1/1950/1891/files/GAFLogo-Primary-WhiteBG_51691f07-8b4f-4d1d-aefc-f2fc004eaa84.png?v=1775792576";

// ===== LOGO =====
const Logo = () => {
  const th = useTheme();
  return <img src={GAF_LOGO} alt="GAF" className={`h-8 w-auto object-contain opacity-60 ${th.logoFilter}`} />;
};

// ===== SLIDE WRAPPER =====
const Slide = ({ children, num, total }) => {
  const th = useTheme();
  return (
  <div className={`w-full h-full ${th.bg} ${th.text} flex flex-col relative overflow-hidden`}>
    <div className="slash" style={{top:'30%',left:'-50%',background:`linear-gradient(90deg,transparent,${th.slashColor},transparent)`}}></div>
    <div className="slash" style={{top:'60%',left:'-30%',background:`linear-gradient(90deg,transparent,${th.slashColor},transparent)`}}></div>
    <header className="flex justify-between items-center px-10 pt-6 pb-4 z-10 shrink-0">
      <Logo />
      <div className="flex items-center gap-3">
        <span className={`text-[14px] font-heading font-light tracking-[.3em] ${th.sub} uppercase`}>Market Intelligence</span>
        <div className={`w-px h-4 ${th.bg3}`}></div>
        <span className={`text-[14px] font-body ${th.sub}`}>{num}<span className={`${th.muted} mx-1`}>/</span>{total}</span>
      </div>
    </header>
    <main className="flex-1 flex flex-col z-10 overflow-hidden px-10 pb-8">
      {children}
    </main>
    <footer className="h-1 bg-gradient-to-r from-gaf-orange via-gaf-orange to-transparent z-10 shrink-0" style={{width: `${(num/total)*100}%`}}></footer>
  </div>
  );
};

// ===== SECTION TITLE =====
const SectionTitle = ({ pre, title, sub }) => {
  const th = useTheme();
  return (
  <div className="mb-5 shrink-0 stagger">
    {pre && <p className="text-[14px] font-heading tracking-[.4em] text-gaf-orange uppercase mb-2">{pre}</p>}
    <h1 className={`font-display text-5xl md:text-7xl ${th.text} leading-[0.9] tracking-wide`}>{title}</h1>
    {sub && <p className={`text-[15px] ${th.sub} mt-3 font-body max-w-2xl leading-relaxed`}>{sub}</p>}
  </div>
  );
};

// ===== SLIDE 1: MARKET SIZING =====
const MarketSlide = ({ n, t }) => {
  const th = useTheme();
  const segments = [
    {
      icon: Home, label: 'B2C Home Gyms', tam: '$300M', color: '#f26422',
      stats: [
        { label: 'AU Households', value: '10.5M' },
        { label: 'Equipment Ownership', value: '92%' },
        { label: 'CAGR (2025-32)', value: '5-7%' },
      ],
      drivers: [
        'WFH culture sustaining home gym adoption',
        'Functional trainers growing 8.6% globally',
        'Only 6% own a power rack -- massive upgrade headroom',
      ],
    },
    {
      icon: Pickaxe, label: 'B2B Mining (FIFO)', tam: '$4.5M', color: '#3b82f6',
      stats: [
        { label: 'FIFO Camps w/ Gyms', value: '~250' },
        { label: 'Avg Fitout Value', value: '$80K' },
        { label: 'Refresh Cycle', value: '5-7 yrs' },
      ],
      drivers: [
        'Lithium & rare earth expansion creating new camps',
        'Resort-style upgrades (MinRes, BHP raising the bar)',
        '80,000+ FIFO workers expect gym as standard',
      ],
    },
    {
      icon: Shield, label: 'B2B Defence (ADF)', tam: '$1.5M', color: '#6366f1',
      stats: [
        { label: 'ADF Bases', value: '65' },
        { label: 'Personnel', value: '94,500' },
        { label: 'Refresh Cycle', value: '5-7 yrs' },
      ],
      drivers: [
        '$50B+ defence investment pipeline (AUKUS)',
        'Standing procurement panel (SON3489273)',
        'Structured tenders favour established suppliers',
      ],
    },
  ];

  return (
    <Slide num={n} total={t}>
      <SectionTitle pre="Strategy Day 2026" title="AUSTRALIAN GYM EQUIPMENT" sub="Total Addressable Market by Segment — Bottom-Up Model" />

      <div className="flex items-center gap-4 mb-5 stagger">
        <div className={`${th.insightBg} border ${th.insightBorder} rounded-lg px-5 py-2.5 flex items-center gap-3`}>
          <span className="font-heading text-gaf-orange text-sm font-semibold uppercase tracking-wider">Combined Annual TAM</span>
          <span className={`font-display text-4xl ${th.text}`}>$306M</span>
        </div>
        <div className={`${th.statCardBg} rounded-lg px-4 py-2.5`}>
          <span className={`font-body ${th.sub} text-sm`}>Projected 2030: <span className={`${th.text} font-semibold`}>$430M+</span></span>
        </div>
      </div>

      <div className="grid grid-cols-3 gap-5 flex-1 stagger">
        {segments.map((seg) => {
          const Icon = seg.icon;
          return (
          <div key={seg.label} className={`${th.cardBg} border ${th.cardBorder} rounded-xl p-5 flex flex-col`}>
            <div className="flex items-center gap-2.5 mb-3">
              <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: seg.color + '15' }}>
                <Icon size={16} style={{ color: seg.color }} />
              </div>
              <span className={`font-heading ${th.text} text-sm font-semibold uppercase tracking-wider`}>{seg.label}</span>
            </div>

            <div className="mb-4">
              <span className="font-display text-[2.8rem] leading-none" style={{ color: seg.color }}>{seg.tam}</span>
              <span className={`font-body ${th.sub} text-xs ml-2`}>/year</span>
            </div>

            <div className="flex flex-wrap gap-2 mb-4">
              {seg.stats.map((s) => (
                <div key={s.label} className={`${th.pillBg} rounded-md px-2.5 py-1`}>
                  <span className={`font-body ${th.pillText} text-xs`}>{s.label}: </span>
                  <span className={`font-heading ${th.text} text-xs font-semibold`}>{s.value}</span>
                </div>
              ))}
            </div>

            <div className="flex-1">
              <span className={`font-heading ${th.sub} text-xs uppercase tracking-wider mb-2 block`}>Growth Drivers</span>
              <ul className="space-y-1.5">
                {seg.drivers.map((d, j) => (
                  <li key={j} className="flex items-start gap-2">
                    <div className="w-1 h-1 rounded-full mt-1.5 flex-shrink-0" style={{ background: seg.color }} />
                    <span className={`font-body ${th.sub} text-xs leading-relaxed`}>{d}</span>
                  </li>
                ))}
              </ul>
            </div>
          </div>
          );
        })}
      </div>

      <div className="mt-3 shrink-0">
        <span className={`font-body ${th.footerText} text-[11px]`}>Sources: FBI Global Report (2024), ABS, AusTender, Geoscience AU, AFS Consumer Study (2021), GAF Sales Intelligence (2026)</span>
      </div>
    </Slide>
  );
};

// ===== SLIDE 2: GAF POSITION =====
const PositionSlide = ({ n, t }) => {
  const th = useTheme();

  const rows = [
    { segment: 'B2C Home Gyms', color: '#f26422', tam: '$300M', aov: '$2,609', cac: '$186', ltv: '~$3,200', comp: 'High', compColor: '#ef4444', edge: 'All-in-one range, showroom network, finance options', opp: 'Power rack penetration at 6% -- 94% of home trainers yet to upgrade' },
    { segment: 'B2B Mining', color: '#3b82f6', tam: '$4.5M', aov: '$4,770', cac: '$126', ltv: '~$15K+', comp: 'Low', compColor: '#22c55e', edge: 'Existing commercial sales capability, install service, bulk pricing', opp: 'Resort-style camp upgrades creating premium replacement cycle' },
    { segment: 'B2B Defence', color: '#6366f1', tam: '$1.5M', aov: '$20,297', cac: '$126', ltv: '~$60K+', comp: 'Low', compColor: '#22c55e', edge: 'Already winning orders ($20K AOV), ADF procurement panel exists', opp: 'AUKUS spend + new base builds; one order = 8 home gym sales' },
  ];

  return (
    <Slide num={n} total={t}>
      <SectionTitle pre="Competitive Assessment" title="GAF MARKET POSITION" sub="Unit Economics & Strategic Advantage by Segment" />

      <div className={`${th.insightBg} border ${th.insightBorder} rounded-lg px-5 py-3 mb-5 flex items-center gap-3 shrink-0`}>
        <Bolt size={16} className="text-gaf-orange flex-shrink-0" />
        <span className={`font-body ${th.insightText} text-sm`}>B2B segments deliver <span className={`${th.text} font-semibold`}>7.8x higher AOV</span> at <span className={`${th.text} font-semibold`}>32% lower CAC</span> than B2C. A single Defence order equals 8 home gym sales.</span>
      </div>

      <div className={`flex-1 ${th.tableBg} border ${th.cardBorder} rounded-xl overflow-hidden flex flex-col`}>
        <div className={`grid grid-cols-[170px_85px_95px_75px_80px_80px_1fr_1fr] gap-0 ${th.tableHeaderBg} px-5 py-3 shrink-0`}>
          {['Segment', 'Annual TAM', 'GAF AOV', 'GAF CAC', 'Est. LTV', 'Competition', 'GAF Edge', 'Opportunity'].map((h) => (
            <span key={h} className={`font-heading ${th.sub} text-[11px] font-semibold uppercase tracking-wider`}>{h}</span>
          ))}
        </div>
        <div className="stagger">
          {rows.map((r) => (
            <div key={r.segment} className={`grid grid-cols-[170px_85px_95px_75px_80px_80px_1fr_1fr] gap-0 px-5 py-3.5 border-t ${th.tableRowBorder} ${th.tableHover} transition-colors`}>
              <div className="flex items-center gap-2">
                <div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ background: r.color }} />
                <span className={`font-heading ${th.text} text-[13px] font-semibold`}>{r.segment}</span>
              </div>
              <span className={`font-heading ${th.text} text-[13px] font-bold`}>{r.tam}</span>
              <span className="font-heading text-[13px] font-bold" style={{ color: r.color }}>{r.aov}</span>
              <span className={`font-body ${th.sub} text-[13px]`}>{r.cac}</span>
              <span className={`font-body ${th.sub} text-[13px]`}>{r.ltv}</span>
              <span className="font-heading text-[11px] font-semibold uppercase px-2 py-0.5 rounded-full inline-flex items-center" style={{ color: r.compColor, background: r.compColor + '15' }}>{r.comp}</span>
              <span className={`font-body ${th.sub} text-[12px] leading-relaxed pr-3`}>{r.edge}</span>
              <span className={`font-body ${th.sub} text-[12px] leading-relaxed`}>{r.opp}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="mt-4 grid grid-cols-3 gap-4 shrink-0 stagger">
        <div className={`${th.statCardBg} border ${th.statCardBorder} rounded-lg px-4 py-3 text-center`}>
          <span className="font-display text-gaf-orange text-3xl block">$126</span>
          <span className={`font-body ${th.sub} text-xs`}>B2B CAC (lowest segment)</span>
        </div>
        <div className={`${th.statCardBg} border ${th.statCardBorder} rounded-lg px-4 py-3 text-center`}>
          <span className="font-display text-gaf-orange text-3xl block">$20,297</span>
          <span className={`font-body ${th.sub} text-xs`}>Defence AOV (highest segment)</span>
        </div>
        <div className={`${th.statCardBg} border ${th.statCardBorder} rounded-lg px-4 py-3 text-center`}>
          <span className="font-display text-gaf-orange text-3xl block">161:1</span>
          <span className={`font-body ${th.sub} text-xs`}>Defence AOV:CAC ratio</span>
        </div>
      </div>

      <div className="mt-2 shrink-0">
        <span className={`font-body ${th.footerText} text-[11px]`}>Sources: GAF Sales Intelligence (1,619 calls, $5.9M revenue), Profit Per X CAC Model (12,078 customers), FBI Global (2024)</span>
      </div>
    </Slide>
  );
};

// ===== APP =====
const SLIDES = [MarketSlide, PositionSlide];

function App() {
  const [idx, setIdx] = useState(0);
  const [key, setKey] = useState(0);
  const [dark, setDark] = useState(true);
  const [zoom, setZoom] = useState(() => Math.min(window.innerWidth / 1600, window.innerHeight / 900, 1));
  const th = dark ? themes.dark : themes.light;

  const go = useCallback((dir) => {
    const next = idx + dir;
    if (next >= 0 && next < SLIDES.length) { setIdx(next); setKey(k => k + 1); }
  }, [idx]);

  useEffect(() => {
    const calc = () => setZoom(Math.min(window.innerWidth / 1600, window.innerHeight / 900, 1));
    window.addEventListener('resize', calc);
    return () => window.removeEventListener('resize', calc);
  }, []);

  useEffect(() => {
    const h = e => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
      else if (e.key === 'ArrowLeft') go(-1);
      else if (e.key === 'd' || e.key === 'D') setDark(d => !d);
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [go]);

  useEffect(() => {
    document.body.style.background = th.bodyBg;
    document.body.className = th.grainClass;
  }, [dark]);

  const C = SLIDES[idx];
  return (
    <ThemeCtx.Provider value={th}>
      <div className="w-screen h-screen overflow-hidden flex items-center justify-center" style={{background: th.bodyBg}}>
        <div key={key} className="overflow-hidden slide-enter rounded-lg shrink-0" style={{width: 1600, height: 900, zoom, boxShadow: dark ? '0 0 80px rgba(0,0,0,.6)' : '0 4px 60px rgba(0,0,0,.12)'}}>
          <C n={idx + 1} t={SLIDES.length} />
          <div className="absolute bottom-6 right-8 flex gap-2 z-50">
            <button onClick={() => setDark(d => !d)} title="Toggle theme (D)"
              className={`w-9 h-9 rounded-full flex items-center justify-center transition-all border ${th.navBg} ${th.navBorder} ${th.navText} ${th.navHover}`}>
              {dark ? <Sun size={14} /> : <Moon size={14} />}
            </button>
            <div className="w-px h-9 bg-gaf-orange/20"></div>
            <button onClick={() => go(-1)} disabled={idx===0}
              className={`w-9 h-9 rounded-full flex items-center justify-center transition-all border ${idx===0 ? th.navDisabled : `${th.navBg} ${th.navBorder} ${th.navText} ${th.navHover}`}`}>
              <ChevL size={16} />
            </button>
            <button onClick={() => go(1)} disabled={idx===SLIDES.length-1}
              className={`w-9 h-9 rounded-full flex items-center justify-center transition-all border ${idx===SLIDES.length-1 ? th.navDisabled : `${th.navBg} ${th.navBorder} ${th.navText} ${th.navHover}`}`}>
              <ChevR size={16} />
            </button>
          </div>
        </div>
      </div>
    </ThemeCtx.Provider>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
